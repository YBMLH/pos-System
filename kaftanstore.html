let salesSearch='', salesPeriod='all', salesCustomFrom='', salesCustomTo='', salesLimit=50, actLimit=100;
async function viewSales(){
  const view=document.getElementById('view');
  const all=(await idbAll('sales')).sort((a,b)=>b.createdAt-a.createdAt);
  const {from,to}=dateRangeFor(salesPeriod,salesCustomFrom,salesCustomTo);
  const q=salesSearch.toLowerCase();
  const filt=all.filter(s=> s.createdAt>=from && s.createdAt<=to &&
    (!q || [s.customerName,...(s.items||[]).map(i=>i.name)].some(x=>String(x||'').toLowerCase().includes(q))));
  view.innerHTML=pageHead(t('salesHistory'),'',
    `<div class="seg" id="salesSeg">${['today','week','month','all','custom'].map(p=>`<button data-p="${p}" class="${salesPeriod===p?'on':''}">${esc(t(p))}</button>`).join('')}</div>`)+
    (salesPeriod==='custom'? `<div class="card pad" style="margin-bottom:14px"><div class="row2">
       <div class="field"><label>${esc(t('from'))}</label><input type="date" id="salesFrom" value="${esc(salesCustomFrom)}"></div>
       <div class="field"><label>${esc(t('to'))}</label><input type="date" id="salesTo" value="${esc(salesCustomTo)}"></div>
     </div></div>` : '')+
    `<div class="searchbar" style="margin-bottom:12px">${svg(IC.search,'ic')}<input id="salesSearch" type="search" placeholder="${esc(t('searchProducts'))}" value="${esc(salesSearch)}"></div>`+
    (filt.length? `<div class="tablewrap"><table><thead><tr>
       <th>${esc(t('date'))}</th><th>${esc(t('customer'))}</th><th>${esc(t('item'))}</th>
       <th class="t-right">${esc(t('total'))}</th><th class="t-right">${esc(t('paid'))}</th><th class="t-right">${esc(t('balance'))}</th><th class="t-right">${esc(t('actions'))}</th>
     </tr></thead><tbody>${filt.slice(0,salesLimit).map(rowSale).join('')}</tbody></table></div>
     ${filt.length>salesLimit?`<div style="text-align:center;margin-top:14px"><button class="btn secondary" id="salesMore">${esc(t('showMore'))} (${filt.length-salesLimit})</button></div>`:''}
     <p class="subtle" style="text-align:center;font-size:12px;margin-top:8px">${Math.min(salesLimit,filt.length)} / ${filt.length}</p>`
     : emptyState(IC.cart,t('nothingYet'),''));
  document.getElementById('salesMore')&&(document.getElementById('salesMore').onclick=()=>{ salesLimit+=50; viewSales(); });
  view.querySelectorAll('#salesSeg button').forEach(b=>b.onclick=()=>{ salesPeriod=b.dataset.p; salesLimit=50; viewSales(); });
  const sf=document.getElementById('salesFrom'), st=document.getElementById('salesTo');
  if(sf) sf.onchange=()=>{ salesCustomFrom=sf.value; salesLimit=50; viewSales(); };
  if(st) st.onchange=()=>{ salesCustomTo=st.value; salesLimit=50; viewSales(); };
  const s=document.getElementById('salesSearch'); if(s){ s.oninput=()=>{ salesSearch=s.value; salesLimit=50; const pos=s.selectionStart; viewSales().then(()=>{ const n=document.getElementById('salesSearch'); if(n){n.focus(); n.setSelectionRange(pos,pos);} }); }; }
  view.querySelectorAll('[data-reprint]').forEach(b=>b.onclick=async()=>{ const sale=await idbGet('sales',b.dataset.reprint); offerReceipt(()=>buildSaleReceiptHtml(sale,sale.items||[]), t('reprint')); });
  view.querySelectorAll('[data-refund]').forEach(b=>b.onclick=async()=>openRefundModal(await idbGet('sales',b.dataset.refund)));
  view.querySelectorAll('[data-void]').forEach(b=>b.onclick=async()=>voidSale(await idbGet('sales',b.dataset.void)));
}
function rowSale(s){
  const itemsLabel=(s.items||[]).map(i=>`${i.name}×${i.qty}`).join(', ');
  const refunded=s.refunded? `<span class="badge red">${esc(t('refund'))}</span>` : '';
  const voided=s.voided? `<span class="badge red">${esc(t('voided'))}</span>` : '';
  const bal=Math.max(0,(s.total||0)-(s.paid||0));
  const canVoid = !s.refunded && !s.voided && (Date.now()-s.createdAt) < 3600000;
  return `<tr${s.voided?' style="opacity:.55"':''}>
    <td class="mono subtle">${fmtDate(s.createdAt)}</td>
    <td>${esc(s.customerName||t('walkIn'))}</td>
    <td style="max-width:220px" class="subtle">${esc(itemsLabel)}</td>
    <td class="t-right mono">${money(s.total)}</td>
    <td class="t-right mono">${money(s.paid)} ${refunded}${voided}</td>
    <td class="t-right">${s.voided?'—':bal>0?`<span class="badge red">${money(bal)}</span>`:`<span class="badge green">${esc(t('settled'))}</span>`}</td>
    <td class="t-right" style="white-space:nowrap">
      <button class="btn ghost sm" data-reprint="${s.id}" title="${esc(t('reprint'))}">${svg(IC.print,'ic')}</button>
      ${canVoid?`<button class="btn ghost sm" data-void="${s.id}" title="${esc(t('voidSale'))}" style="color:var(--danger)">${svg(IC.close,'ic')}</button>`:''}
      ${!s.refunded&&!s.voided?`<button class="btn ghost sm" data-refund="${s.id}" title="${esc(t('refundSale'))}" style="color:var(--danger)">${svg(IC.ret,'ic')}</button>`:''}
    </td>
  </tr>`;
}
async function voidSale(sale){
  if(!sale) return;
  if(Date.now()-sale.createdAt>=3600000){ toast(t('voidExpired'),'err'); return; }
  const doVoid=async()=>{
    for(const it of (sale.items||[])){ const p=await idbGet('products',it.productId); if(p){ p.qty=(p.qty||0)+it.qty; await idbPut('products',p); await logAct('logStockVoid', `${p.name} +${it.qty} (${p.qty})`, p.id); } }
    const cashBack=sale.paid||0;
    sale.voided=true; sale.paid=0; sale.balance=0;
    await idbPut('sales',sale);
    if(cashBack>0) await idbPut('payments',{id:uid(),customerId:sale.customerId||null,refType:'void',amount:-cashBack,method:sale.method||'cash',createdAt:now(),userId:State.user.id});
    await logAct('logVoidSale', `${sale.customerName||t('walkIn')} · ${money(sale.total)}`);
    toast(t('voided'),'ok'); viewSales();
  };
  confirmDialog(t('voidConfirm'),()=>{ if(!isOwner()) requireAuth(doVoid); else doVoid(); },true);
}
async function openRefundModal(sale){
  modal(t('refundSale'),
   `<p style="font-weight:700;font-size:16px;margin-bottom:2px">${esc(sale.customerName||t('walkIn'))}</p>
    <p class="subtle" style="margin-bottom:14px">${esc(t('total'))}: <b>${money(sale.total)}</b> · ${esc(t('paid'))}: ${money(sale.paid)}</p>
    <div class="field"><label>${esc(t('refund'))} ${esc(t('amount'))}</label><input id="rf_amt" type="number" min="0" max="${sale.paid}" step="0.01" value="${sale.paid}"></div>
    <div class="field"><label class="check"><input type="checkbox" id="rf_restock" checked> ${esc(t('addStock'))} (${esc(t('reasonForAction'))}: ${esc(t('refundSale'))})</label></div>
    <div class="field"><label>${esc(t('reasonForAction'))} *</label><input id="rf_reason" type="text" placeholder="${esc(t('requireReason'))}"></div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="rf_go" style="background:var(--danger)">${esc(t('refundSale'))}</button>`);
  document.getElementById('rf_go').onclick=async()=>{
    const amt=Math.min(sale.paid,Math.max(0,Number(document.getElementById('rf_amt').value||0)));
    const reason=document.getElementById('rf_reason').value.trim();
    if(!reason){ toast(t('required'),'err'); return; }
    const restock=document.getElementById('rf_restock').checked;
    const finalize=async()=>{
      if(restock){ for(const it of (sale.items||[])){ const p=await idbGet('products',it.productId); if(p){ p.qty=(p.qty||0)+it.qty; await idbPut('products',p); await logAct('logStockRefund', `${p.name} +${it.qty} (${p.qty})`, p.id); } } }
      sale.refunded=true; sale.refundAmount=(sale.refundAmount||0)+amt; sale.refundReason=reason;
      sale.paid=Math.max(0,(sale.paid||0)-amt);
      sale.total=Math.max(0,(sale.total||0)-amt);
      sale.balance=Math.max(0,(sale.total||0)-sale.paid);
      await idbPut('sales',sale);
      if(amt>0) await idbPut('payments',{id:uid(),customerId:sale.customerId||null,refType:'refund',amount:-amt,method:sale.method||'cash',createdAt:now(),userId:State.user.id});
      await logAct('logRefundSale', `${sale.customerName||t('walkIn')} · ${money(amt)} · ${reason}`);
      closeModal(); toast(t('stockAdded'),'ok'); viewSales();
    };
    if(!isOwner()) requireAuth(finalize); else finalize();
  };
}
let repPeriod='month', repCustomFrom='', repCustomTo='', bestMode='volume';
async function viewReports(){
  const view=document.getElementById('view');
  if(!isOwner()){ view.innerHTML=pageHead(t('reports'))+emptyState(IC.chart,t('ownerOnly'),t('ownerOnlyMsg')); return; }
  const {from,to}=dateRangeFor(repPeriod,repCustomFrom,repCustomTo);
  const [sales,rentals,expenses,products]=await Promise.all([idbAll('sales'),idbAll('rentals'),idbAll('expenses'),idbAll('products')]);
  const S=sales.filter(s=>s.createdAt>=from && s.createdAt<=to && !s.voided), R=rentals.filter(r=>r.createdAt>=from && r.createdAt<=to), E=expenses.filter(x=>x.createdAt>=from && x.createdAt<=to && !x.isWithdrawal);
  const salesRev=S.reduce((a,s)=>a+(s.paid||0),0);
  const rentRev=R.reduce((a,r)=>a+(r.paid||0),0);
  // Deposits kept (damage/cleaning/late/lost) are income, recognised when the item is returned.
  const depKept=rentals.filter(r=>(r.depositKept||0)>0 && (r.returnedAt||r.createdAt)>=from && (r.returnedAt||r.createdAt)<=to).reduce((a,r)=>a+(r.depositKept||0),0);
  const revenue=salesRev+rentRev+depKept;
  const exp=E.reduce((a,x)=>a+(x.amount||0),0);
  // cost of goods sold (owner sees profit): sum cost of sold items in period
  let cogs=0;
  const prodMap={}; products.forEach(p=>prodMap[p.id]=p);
  // best-sellers aggregation
  const sellAgg={}; // productId -> {name,qty,revenue,profit}
  for(const s of S){ for(const it of (s.items||[])){
    const p=prodMap[it.productId];
    if(p&&p.costPrice) cogs+=p.costPrice*it.qty;
    const key=it.productId||it.name;
    if(!sellAgg[key]) sellAgg[key]={name:it.name,qty:0,revenue:0,profit:0};
    sellAgg[key].qty+=it.qty;
    sellAgg[key].revenue+=(it.price*it.qty);
    sellAgg[key].profit+=((it.price-(p?p.costPrice||0:0))*it.qty);
  }}
  const bestList=Object.values(sellAgg).sort((a,b)=> bestMode==='profit'? b.profit-a.profit : b.qty-a.qty).slice(0,8);
  const topItem=Object.values(sellAgg).sort((a,b)=>b.qty-a.qty)[0]||null;
  const custAgg={}; // customerId -> {name,count,total}
  for(const s of S){ if(!s.customerId) continue; const key=s.customerId; if(!custAgg[key]) custAgg[key]={name:s.customerName,count:0,total:0}; custAgg[key].count++; custAgg[key].total+=(s.paid||0); }
  for(const r of R){ if(!r.customerId) continue; const key=r.customerId; if(!custAgg[key]) custAgg[key]={name:r.customerName,count:0,total:0}; custAgg[key].count++; custAgg[key].total+=(r.paid||0); }
  const topCustomer=Object.values(custAgg).sort((a,b)=>b.count-a.count)[0]||null;
  // last-7-days trend (always last 7 calendar days regardless of selected period, for consistent chart context)
  const dayLabels=[], salesDaily=[], rentDaily=[], expDaily=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    const dStart=d.getTime(), dEnd=dStart+86400000;
    dayLabels.push(d.toLocaleDateString(State.lang,{weekday:'short'}));
    salesDaily.push(sales.filter(s=>s.createdAt>=dStart&&s.createdAt<dEnd).reduce((a,s)=>a+(s.paid||0),0));
    rentDaily.push(rentals.filter(r=>r.createdAt>=dStart&&r.createdAt<dEnd).reduce((a,r)=>a+(r.paid||0),0));
    expDaily.push(expenses.filter(x=>x.createdAt>=dStart&&x.createdAt<dEnd).reduce((a,x)=>a+(x.amount||0),0));
  }
  const profit=revenue-exp-cogs;
  const custs=await getCustomers(); let owed=0; for(const c of custs) owed+=await customerBalance(c.id);

  view.innerHTML=pageHead(t('reports'),'',
    `<div class="seg" id="repSeg">
       ${['today','week','month','all','custom'].map(p=>`<button data-p="${p}" class="${repPeriod===p?'on':''}">${esc(t(p))}</button>`).join('')}
     </div>`)+
    (repPeriod==='custom'? `<div class="card pad" style="margin-bottom:14px"><div class="row2">
       <div class="field"><label>${esc(t('from'))}</label><input type="date" id="repFrom" value="${esc(repCustomFrom)}"></div>
       <div class="field"><label>${esc(t('to'))}</label><input type="date" id="repTo" value="${esc(repCustomTo)}"></div>
     </div></div>` : '')+
   `<div class="cards" style="margin-bottom:22px">
     <div class="stat gold"><div class="corner">${svg(IC.money)}</div><div class="k">${esc(t('revenue'))}</div><div class="v mono">${money(revenue)}</div></div>
     <div class="stat"><div class="corner">${svg(IC.chart)}</div><div class="k">${esc(t('expenses'))}</div><div class="v mono">${money(exp)}</div></div>
     <div class="stat ${profit>=0?'':'danger'}"><div class="corner">${svg(IC.up)}</div><div class="k">${esc(t('profit'))}</div><div class="v mono">${money(profit)}</div></div>
     <div class="stat ${owed>0?'warn':''}"><div class="corner">${svg(IC.debt)}</div><div class="k">${esc(t('debtOutstanding'))}</div><div class="v mono">${money(owed)}</div></div>
   </div>
   <div class="cards" style="margin-bottom:22px">
     <div class="stat brand"><div class="corner">${svg(IC.users)}</div><div class="k">${esc(t('bestCustomer'))}</div>
       <div class="v" style="font-size:18px">${topCustomer?esc(topCustomer.name):'—'}</div>
       ${topCustomer?`<div class="sub">${topCustomer.count} ${esc(t('purchases'))} · ${money(topCustomer.total)}</div>`:''}
     </div>
     <div class="stat brand"><div class="corner">${svg(IC.box)}</div><div class="k">${esc(t('mostPopularItem'))}</div>
       <div class="v" style="font-size:18px">${topItem?esc(topItem.name):'—'}</div>
       ${topItem?`<div class="sub">${esc(t('soldTimes').replace('{n}',topItem.qty))}</div>`:''}
     </div>
   </div>
   <div class="grid" style="grid-template-columns:1fr 1fr;gap:18px" id="repGrid">
     <div class="card pad">
       <h3 style="margin-bottom:12px">${esc(t('breakdown'))}</h3>
       <table><tbody>
         <tr><td>${esc(t('salesRevenue'))}</td><td class="t-right mono">${money(salesRev)}</td></tr>
         <tr><td>${esc(t('rentalRevenue'))}</td><td class="t-right mono">${money(rentRev)}</td></tr>
         ${depKept>0?`<tr><td>${esc(t('depositsKept'))}</td><td class="t-right mono">${money(depKept)}</td></tr>`:''}
         <tr><td class="subtle">${esc(t('cost'))} (COGS)</td><td class="t-right mono subtle">− ${money(cogs)}</td></tr>
         <tr><td class="subtle">${esc(t('expenses'))}</td><td class="t-right mono subtle">− ${money(exp)}</td></tr>
         <tr><td><b>${esc(t('profit'))}</b></td><td class="t-right mono"><b>${money(profit)}</b></td></tr>
       </tbody></table>
     </div>
     <div class="card pad">
       <div style="display:flex;align-items:center;margin-bottom:12px"><h3>${esc(t('expenses'))}</h3><button class="btn sm" id="addExp" style="margin-inline-start:auto">${svg(IC.plus,'ic')}${esc(t('addExpense'))}</button></div>

async function openCashDrawerModal(){
  const t0=startOf('today');
  const payments=(await idbAll('payments')).filter(p=>p.createdAt>=t0 && (p.method||'cash')==='cash');
  const expenses=(await idbAll('expenses')).filter(x=>x.createdAt>=t0);
  const cashIn=payments.reduce((a,p)=>a+(p.amount||0),0); // journal includes negatives for refunds/voids
  const cashOut=expenses.reduce((a,x)=>a+(x.amount||0),0);
  const expected=cashIn-cashOut;
  modal(t('cashCount'),
   `<p class="subtle" style="margin-bottom:14px">${esc(t('expectedCash'))}: <b class="mono">${money(expected)}</b></p>
    <div class="field"><label>${esc(t('actualCash'))}</label><input id="cd_actual" type="number" min="0" step="0.01" value="${expected}"></div>
    <p id="cd_diff" class="subtle" style="margin-top:8px"></p>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('close'))}</button>`);
  const inp=document.getElementById('cd_actual'), diff=document.getElementById('cd_diff');
  function sync(){ const actual=Number(inp.value||0); const d=actual-expected;
    diff.innerHTML = d===0? `<span class="badge green">${esc(t('difference'))}: 0</span>` : `<span class="badge ${d>0?'green':'red'}">${esc(t('difference'))}: ${d>0?'+':''}${money(d)}</span>`; }
  inp.oninput=sync; sync();
}

async function doBackup(){
  const data={_app:'kaftan-store',_v:1,exportedAt:now()};
  for(const s of STORES) data[s]=await idbAll(s);
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`kaftan-backup-${todayISO()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  logAct('logBackup','');
  const m=await idbGet('meta','app'); if(m){ m.lastBackup=now(); await idbPut('meta',m); }
  toast(t('backupDone'),'ok');
}
function doRestore(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const data=JSON.parse(reader.result);
      if(data._app!=='kaftan-store'){ toast('Invalid file','err'); return; }
      confirmDialog(t('restoreConfirm'),async()=>{
        for(const s of STORES){ await idbClear(s); for(const rec of (data[s]||[])) await idbPut(s,rec); }
        const meta=await idbGet('meta','app'); if(meta){ State.lang=meta.lang||State.lang; State.storeName=meta.storeName; }
        State.user=null; State.cart=[]; toast(t('restored'),'ok'); render();
      });
    }catch(err){ toast('Invalid file','err'); }
    e.target.value='';
  };
  reader.readAsText(file);
}

let _autoLockTimer=null, _autoLockHandlers=false;
function setupAutoLock(minutes){
  minutes=Number(minutes||0);
  if(_autoLockTimer){ clearTimeout(_autoLockTimer); _autoLockTimer=null; }
  const reset=()=>{
    if(_autoLockTimer) clearTimeout(_autoLockTimer);
    if(minutes>0 && State.user){
      _autoLockTimer=setTimeout(()=>{
        if(State.user){ State.user=null; State.cart=[]; closeModal(); toast(t('autoLocked'),'ok'); render(); }
      }, minutes*60000);
    }
  };
  State._resetIdle=reset;
  if(!_autoLockHandlers){
    ['click','keydown','touchstart','mousemove'].forEach(ev=>document.addEventListener(ev,()=>{ if(State._resetIdle) State._resetIdle(); },{passive:true}));
    _autoLockHandlers=true;
  }
  reset();
}
(async function boot(){
  try{
    State.db=await openDB();
    try{ if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } }catch(e){}
    const meta=await idbGet('meta','app');
    if(meta && meta.lang) State.lang=meta.lang;
    if(meta) setupAutoLock(meta.autoLockMin);
    render();
  }catch(err){
    document.getElementById('app').innerHTML=`<div style="padding:40px;text-align:center"><h2>Storage error</h2><p class="subtle">${esc(err.message||err)}</p><p class="subtle">This app needs IndexedDB. Try a normal (non-private) browser window.</p></div>`;
  }
})();

/* -------- Global Escape closes modal; POS shortcuts (Enter=checkout, Esc=clear cart) -------- */
document.addEventListener('keydown', e=>{
  const modalRoot=document.getElementById('modalRoot');
  const modalOpen = modalRoot && modalRoot.innerHTML.trim()!=='';
  if(e.key==='Escape' && modalOpen){ closeModal(); return; }
  if(State.route!=='pos' || modalOpen) return;
  const inSearchBox = document.activeElement && document.activeElement.id==='posSearch';
  if(inSearchBox) return;
  if(e.key==='Enter'){
    if(State.cart && State.cart.length){ e.preventDefault(); document.getElementById('checkout')?.click(); }
  } else if(e.key==='Escape'){
    if(State.cart && State.cart.length){ e.preventDefault(); document.getElementById('clearCart')?.click(); }
  }
});

/* ============================================================
   ELECTRON BRIDGE — only active when running inside Electron
============================================================ */
(function initElectron(){
  if(typeof window.electronAPI === 'undefined') return; // running in browser, skip

  // Show the custom title bar
  document.body.classList.add('in-electron');
  const bar = document.getElementById('electron-titlebar');
  if(bar) bar.style.display = 'flex';

  // Wire window control buttons
  document.getElementById('tb-min')  ?.addEventListener('click', () => window.electronAPI.minimize());
  document.getElementById('tb-max')  ?.addEventListener('click', () => window.electronAPI.maximize());
  document.getElementById('tb-close')?.addEventListener('click', () => window.electronAPI.close());

  // Update maximize icon when window state changes
  async function syncMaxIcon(){
    const isMax = await window.electronAPI.isMaximized();
    const btn = document.getElementById('tb-max');
    if(!btn) return;
    btn.title = isMax ? 'Restore' : 'Maximise';
    btn.querySelector('svg').innerHTML = isMax
      ? '<path fill="none" stroke="currentColor" stroke-width="1.8" d="M7 4h9v9M4 7h9v9"/>'  // restore icon
      : '<rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/>'; // maximize icon
  }
  window.addEventListener('resize', syncMaxIcon);
  syncMaxIcon();

  // Listen for store name changes broadcast from main process
  window.electronAPI.onStoreNameChanged(name => {
    const el = document.getElementById('tb-store-name');
    if(el) el.textContent = name || 'Kaftan Store';
  });

  // Patch the Settings save so it also notifies Electron when store name changes.
  // We hook into idbPut — when 'meta' is saved we send the name to the title bar.
  const _origIdbPut = idbPut;
  window.idbPut = idbPut = async function(store, val){
    const result = await _origIdbPut(store, val);
    if(store === 'meta' && val && val.storeName){
      window.electronAPI.setStoreName(val.storeName);
      const el = document.getElementById('tb-store-name');
      if(el) el.textContent = val.storeName;
    }
    return result;
  };

  // On first load, try to read the store name from the DB and set the title bar
  (async function setInitialName(){
    try{
      const meta = await idbGet('meta','app');
      if(meta && meta.storeName){
        window.electronAPI.setStoreName(meta.storeName);
        const el = document.getElementById('tb-store-name');
        if(el) el.textContent = meta.storeName;
      }
    }catch(e){}
  })();
})();
</script>
