         ${isOwner()?`<button class="btn danger" id="btnReset" style="margin-inline-start:auto">${esc(t('resetApp'))}</button>`:''}
       </div>
       <input type="file" id="restoreFile" accept="application/json" class="hidden">
       <p class="subtle" style="font-size:12px;margin-top:12px">${esc(t('backupHint'))}</p>
     </div>
   </div>`;
  document.getElementById('fsChoose')&&(document.getElementById('fsChoose').onclick=async()=>{ if(await fsChooseFolder()) viewSettings(); });
  document.getElementById('fsSaveNow')&&(document.getElementById('fsSaveNow').onclick=async()=>{ const ok=await fsSaveAll(true); toast(ok?t('backupDone'):t('fsUnsupported'), ok?'ok':'err'); viewSettings(); });
  document.getElementById('fsLoadNow')&&(document.getElementById('fsLoadNow').onclick=()=>confirmDialog(t('restoreConfirm'),()=>fsLoadAll(true)));
  document.getElementById('set_save').onclick=async()=>{
    meta.storeName=document.getElementById('set_name').value.trim()||t('app');
    State.lang=document.getElementById('set_lang').value; meta.lang=State.lang;
    meta.darkMode=document.getElementById('set_dark').checked;
    meta.tabletMode=document.getElementById('set_tablet').checked;
    const lockSel=document.getElementById('set_lock'); if(lockSel) meta.autoLockMin=Number(lockSel.value||0);
    State.storeName=meta.storeName;
    document.body.classList.toggle('dark',!!meta.darkMode);
    document.body.classList.toggle('tablet',!!meta.tabletMode);
    await idbPut('meta',meta); toast(t('saved'),'ok'); await logAct('logSettings',''); setupAutoLock(meta.autoLockMin); renderApp();
  };
  const saveCodeBtn=document.getElementById('saveCode');
  if(saveCodeBtn){ saveCodeBtn.onclick=async()=>{
    const code=(document.getElementById('set_code').value||'').trim();
    if(!/^\d{4,6}$/.test(code)){ toast(t('pinShort'),'err'); return; }
    const m=await idbGet('meta','app'); m.authCode=hashPin(code); await idbPut('meta',m);
    await logAct('logCode',''); toast(t('codeSaved'),'ok'); viewSettings();
  }; }
  document.getElementById('btnBackup').onclick=doBackup;
  document.getElementById('btnRestore').onclick=()=>document.getElementById('restoreFile').click();
  document.getElementById('restoreFile').onchange=doRestore;
  document.getElementById('btnReset')&&(document.getElementById('btnReset').onclick=()=>confirmDialog(t('resetConfirm'),async()=>{ for(const s of STORES) await idbClear(s); State.user=null; State.cart=[]; toast(t('deleted'),'ok'); render(); },true));
}
async function buildSnapshot(){
  const data={_app:'kaftan-store',_v:1,exportedAt:now()};
  for(const s of STORES) data[s]=await idbAll(s);
  return data;
}
async function doBackup(){
  const data=await buildSnapshot();
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`kaftan-backup-${todayISO()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  logAct('logBackup','');
  const m=await idbGet('meta','app'); if(m){ m.lastBackup=now(); await idbPut('meta',m); }
  toast(t('backupDone'),'ok');
}
function doRestore(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const data=JSON.parse(reader.result);
      if(data._app!=='kaftan-store'){ toast('Invalid file','err'); return; }
      confirmDialog(t('restoreConfirm'),async()=>{
        for(const s of STORES){ await idbClear(s); for(const rec of (data[s]||[])) await idbPut(s,rec); }
        const meta=await idbGet('meta','app'); if(meta){ State.lang=meta.lang||State.lang; State.storeName=meta.storeName; }
        State.user=null; State.cart=[]; toast(t('restored'),'ok'); render();
      });
    }catch(err){ toast('Invalid file','err'); }
    e.target.value='';
  };
  reader.readAsText(file);
}

/* ============================================================
   STORE DATA FOLDER — automatic save to a real folder on disk
   Uses the File System Access API (works in Chrome/Edge and inside the
   desktop app). Falls back to manual backup where unsupported.
============================================================ */
const FS_SUPPORTED = typeof window.showDirectoryPicker === 'function';
let _autoSaveTimer=null, _fsBusy=false, _fsPrompted=false;

async function fsGetHandle(){
  if(State.dirHandle) return State.dirHandle;
  try{ const rec=await idbGet('_fs','dir'); if(rec&&rec.handle){ State.dirHandle=rec.handle; return rec.handle; } }catch(e){}
  return null;
}
async function fsHasPermission(handle,prompt){
  if(!handle||!handle.queryPermission) return false;
  const opts={mode:'readwrite'};
  try{
    if((await handle.queryPermission(opts))==='granted') return true;
    if(prompt && (await handle.requestPermission(opts))==='granted') return true;
  }catch(e){}
  return false;
}
async function fsWriteFile(dir,name,text){
  const fh=await dir.getFileHandle(name,{create:true});
  const w=await fh.createWritable(); await w.write(text); await w.close();
}
async function fsFileExists(dir,name){ try{ await dir.getFileHandle(name); return true; }catch(e){ return false; } }
async function fsWriteReadme(dir){
  await fsWriteFile(dir,'README.txt',
    'Kaftan Store Manager — automatic data folder.\r\n\r\n'+
    'Do NOT delete, move or rename this folder while using the app.\r\n'+
    'store-data.json  = your latest data (updated automatically).\r\n'+
    'store-data-YYYY-MM-DD.json = a daily snapshot, kept just in case.\r\n');
}
/* Link (or create) the Store Data folder. Opens on the Desktop; the app
   creates a "Store Data" subfolder inside whatever the user selects. */
async function fsChooseFolder(){
  if(!FS_SUPPORTED){ toast(t('fsUnsupported'),'err'); return false; }
  let parent;
  try{ parent=await window.showDirectoryPicker({id:'kaftanStoreData',mode:'readwrite',startIn:'desktop'}); }
  catch(e){ return false; } // user cancelled the picker
  let dir;
  try{ dir=await parent.getDirectoryHandle('Store Data',{create:true}); }
  catch(e){ toast(t('fsUnsupported'),'err'); return false; }
  State.dirHandle=dir;
  await idbPut('_fs',{id:'dir',handle:dir});
  await fsWriteReadme(dir);
  // If this folder already holds data (e.g. moved to a new PC), offer to load it.
  if(await fsFileExists(dir,'store-data.json')){
    const hasLocal=(await idbAll('products')).length>0 || (await idbAll('sales')).length>0;
    if(!hasLocal){ confirmDialog(t('fsLoadConfirm'),()=>fsLoadAll(true)); }
    else await fsSaveAll(true);
  } else {
    await fsSaveAll(true);
  }
  toast(t('fsLinked'),'ok');
  return true;
}
async function fsSaveAll(force){
  const dir=await fsGetHandle(); if(!dir) return false;
  if(!(await fsHasPermission(dir,false))) return false;
  _fsBusy=true;
  try{
    const text=JSON.stringify(await buildSnapshot());
    await fsWriteFile(dir,'store-data.json',text);
    const daily=`store-data-${todayISO()}.json`;
    // one snapshot per day, never overwritten
    if(!(await fsFileExists(dir,daily))) await fsWriteFile(dir,daily,text);
    const m=await idbGet('meta','app'); if(m){ m.lastBackup=now(); m.lastFsSave=now(); await idbPut('meta',m); }
    return true;
  }catch(e){ return false; }
  finally{ _fsBusy=false; }
}
async function fsLoadAll(reload){
  const dir=await fsGetHandle(); if(!dir) return false;
  if(!(await fsHasPermission(dir,true))){ toast(t('fsUnsupported'),'err'); return false; }
  _fsBusy=true;
  try{
    const fh=await dir.getFileHandle('store-data.json');
    const data=JSON.parse(await (await fh.getFile()).text());
    if(data._app!=='kaftan-store'){ toast('Invalid file','err'); return false; }
    for(const s of STORES){ await idbClear(s); for(const rec of (data[s]||[])) await idbPut(s,rec); }
    const meta=await idbGet('meta','app'); if(meta){ State.lang=meta.lang||State.lang; State.storeName=meta.storeName; }
    toast(t('restored'),'ok');
    if(reload){ State.user=null; State.cart=[]; render(); }
    return true;
  }catch(e){ toast(t('fsUnsupported'),'err'); return false; }
  finally{ _fsBusy=false; }
}
/* Debounced auto-save fired after every data change. */
function scheduleAutoSave(){
  if(_fsBusy || !State.dirHandle) return;
  if(_autoSaveTimer) clearTimeout(_autoSaveTimer);
  _autoSaveTimer=setTimeout(()=>{ fsSaveAll(false); }, 1200);
}
/* Wrap the low-level writes so any change schedules a save. */
function fsInstallAutoSave(){
  const rp=idbPut, rd=idbDel;
  idbPut=function(s,v){ const r=rp(s,v); if(s!=='_fs') scheduleAutoSave(); return r; };
  idbDel=function(s,id){ const r=rd(s,id); scheduleAutoSave(); return r; };
  // Best-effort flush when the app is closing or hidden.
  const flush=()=>{ try{ fsSaveAll(false); }catch(e){} };
  window.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flush(); });
  window.addEventListener('pagehide',flush);
  window.addEventListener('beforeunload',flush);
}
/* One-time prompt (after first setup) to create the Store Data folder. */
async function maybePromptFolderSetup(){
  if(!FS_SUPPORTED || _fsPrompted) return; _fsPrompted=true;
  if(await fsGetHandle()) return;
  const m=await idbGet('meta','app'); if(!m || m.fsPromptDone) return;
  modal(t('fsSetupTitle'),
    `<p style="margin:2px 0 8px">${esc(t('fsSetupMsg'))}</p>
     <p class="subtle" style="font-size:12.5px">${esc(t('fsFolderHint'))}</p>`,
    `<button class="btn secondary" id="fsLater">${esc(t('later'))}</button>
     <button class="btn" id="fsNow">${svg(IC.down,'ic')}${esc(t('fsCreateFolder'))}</button>`);
  const markDone=async()=>{ const mm=await idbGet('meta','app'); if(mm){ mm.fsPromptDone=true; await idbPut('meta',mm); } };
  document.getElementById('fsLater').onclick=async()=>{ await markDone(); closeModal(); };
  document.getElementById('fsNow').onclick=async()=>{ const ok=await fsChooseFolder(); if(ok){ await markDone(); closeModal(); } };
}

/* ============================================================
   BOOT
============================================================ */
let _autoLockTimer=null, _autoLockHandlers=false;
function setupAutoLock(minutes){
  minutes=Number(minutes||0);
  if(_autoLockTimer){ clearTimeout(_autoLockTimer); _autoLockTimer=null; }
  const reset=()=>{
    if(_autoLockTimer) clearTimeout(_autoLockTimer);
    if(minutes>0 && State.user){
      _autoLockTimer=setTimeout(()=>{
        if(State.user){ State.user=null; State.cart=[]; closeModal(); toast(t('autoLocked'),'ok'); render(); }
      }, minutes*60000);
    }
  };
  State._resetIdle=reset;
  if(!_autoLockHandlers){
    ['click','keydown','touchstart','mousemove'].forEach(ev=>document.addEventListener(ev,()=>{ if(State._resetIdle) State._resetIdle(); },{passive:true}));
    _autoLockHandlers=true;
  }
  reset();
}
(async function boot(){
  try{
    State.db=await openDB();
    try{ if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } }catch(e){}
    fsInstallAutoSave();
    await fsGetHandle(); // reconnect the Store Data folder if one was linked before
    const meta=await idbGet('meta','app');
    if(meta && meta.lang) State.lang=meta.lang;
    if(meta && meta.printPref) State.printPref=meta.printPref;
    if(meta) setupAutoLock(meta.autoLockMin);
    render();
  }catch(err){
    document.getElementById('app').innerHTML=`<div style="padding:40px;text-align:center"><h2>Storage error</h2><p class="subtle">${esc(err.message||err)}</p><p class="subtle">This app needs IndexedDB. Try a normal (non-private) browser window.</p></div>`;
  }
})();

/* -------- Global barcode scanner: scan a product anywhere → add 1 to cart --------
   Detects a hardware reader by its speed (fast keystroke burst ending in Enter).
   Capture phase so a scan's Enter is consumed before the checkout shortcut below.
   Ignored while typing in a field (e.g. the POS search box handles its own scan)
   or while a modal is open. */
let _scanBuf='', _scanLast=0;
document.addEventListener('keydown', e=>{
  if(!State.user) return; // only once signed in
  const el=document.activeElement;
  const typing = el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable);
  const modalOpen = document.getElementById('modalRoot').innerHTML.trim()!=='';
  const ts=Date.now(); if(ts-_scanLast>100) _scanBuf=''; _scanLast=ts;
  if(e.key==='Enter'){
    const code=_scanBuf; _scanBuf='';
    if(!typing && !modalOpen && code.length>=3){
      e.preventDefault(); e.stopImmediatePropagation(); // don't also trigger checkout
      handleGlobalScan(code);
    }
    return;
  }
  if(e.key.length===1) _scanBuf+=e.key;
}, true);

/* -------- Global Escape closes modal; POS shortcuts (Enter=checkout, Esc=clear cart) -------- */
document.addEventListener('keydown', e=>{
  const modalRoot=document.getElementById('modalRoot');
  const modalOpen = modalRoot && modalRoot.innerHTML.trim()!=='';
  if(e.key==='Escape' && modalOpen){ closeModal(); return; }
  if(State.route!=='pos' || modalOpen) return;
  const inSearchBox = document.activeElement && document.activeElement.id==='posSearch';
  if(inSearchBox) return;
  if(e.key==='Enter'){
    if(State.cart && State.cart.length){ e.preventDefault(); document.getElementById('checkout')?.click(); }
  } else if(e.key==='Escape'){
    if(State.cart && State.cart.length){ e.preventDefault(); document.getElementById('clearCart')?.click(); }
  }
});

/* ============================================================
   ELECTRON BRIDGE — only active when running inside Electron
============================================================ */
(function initElectron(){
  if(typeof window.electronAPI === 'undefined') return; // running in browser, skip

  // Show the custom title bar
  document.body.classList.add('in-electron');
  const bar = document.getElementById('electron-titlebar');
  if(bar) bar.style.display = 'flex';

  // Wire window control buttons
  document.getElementById('tb-min')  ?.addEventListener('click', () => window.electronAPI.minimize());
  document.getElementById('tb-max')  ?.addEventListener('click', () => window.electronAPI.maximize());
  document.getElementById('tb-close')?.addEventListener('click', () => window.electronAPI.close());

  // Update maximize icon when window state changes
  async function syncMaxIcon(){
    const isMax = await window.electronAPI.isMaximized();
    const btn = document.getElementById('tb-max');
    if(!btn) return;
    btn.title = isMax ? 'Restore' : 'Maximise';
    btn.querySelector('svg').innerHTML = isMax
      ? '<path fill="none" stroke="currentColor" stroke-width="1.8" d="M7 4h9v9M4 7h9v9"/>'  // restore icon
      : '<rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/>'; // maximize icon
  }
  window.addEventListener('resize', syncMaxIcon);
  syncMaxIcon();

  // Listen for store name changes broadcast from main process
  window.electronAPI.onStoreNameChanged(name => {
    const el = document.getElementById('tb-store-name');
    if(el) el.textContent = name || 'Kaftan Store';
  });

  // Patch the Settings save so it also notifies Electron when store name changes.
  // We hook into idbPut — when 'meta' is saved we send the name to the title bar.
  const _origIdbPut = idbPut;
  window.idbPut = idbPut = async function(store, val){
    const result = await _origIdbPut(store, val);
    if(store === 'meta' && val && val.storeName){
      window.electronAPI.setStoreName(val.storeName);
      const el = document.getElementById('tb-store-name');
      if(el) el.textContent = val.storeName;
    }
    return result;
  };

  // On first load, try to read the store name from the DB and set the title bar
  (async function setInitialName(){
    try{
      const meta = await idbGet('meta','app');
      if(meta && meta.storeName){
        window.electronAPI.setStoreName(meta.storeName);
        const el = document.getElementById('tb-store-name');
        if(el) el.textContent = meta.storeName;
      }
    }catch(e){}
  })();
})();
</script>
