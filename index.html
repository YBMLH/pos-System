<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E4D45">
<title>Kaftan Store Manager</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Kaftan Store Manager","short_name":"Kaftan","start_url":".","display":"standalone","background_color":"#0E4D45","theme_color":"#0E4D45","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect width=%22512%22 height=%22512%22 rx=%2296%22 fill=%22%230E4D45%22/%3E%3Cpath d=%22M256 96l40 60h-80z M180 156h152l-20 260H200z%22 fill=%22%23C9A34E%22/%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
<style>
:root{
  --paper:#F6F5F3; --ink:#1A1B1A; --muted:#6B7280; --line:#E4E2DD;
  --brand:#0E4D45; --brand-700:#0A3A34; --brand-100:#DCEAE7;
  --gold:#C9A34E; --gold-soft:#F3EBD6;
  --white:#FFFFFF; --surface:#FFFFFF;
  --ok:#2E7D5B; --ok-100:#DEF0E7; --warn:#B0791E; --warn-100:#F7ECD3;
  --danger:#B23A3A; --danger-100:#F6E1E1;
  --radius:14px; --radius-sm:10px; --shadow:0 1px 2px rgba(20,25,23,.05),0 8px 24px -12px rgba(20,25,23,.18);
  --font: "Segoe UI", Roboto, "Helvetica Neue", system-ui, -apple-system, "Noto Sans Arabic", Tahoma, Arial, sans-serif;
}
body.dark{
  --paper:#15181A; --ink:#E9EBEA; --muted:#9AA3A0; --line:#2A2F2D;
  --brand:#1B6157; --brand-700:#0F4E45; --brand-100:#1E3B36;
  --gold:#D9B565; --gold-soft:#2C2517;
  --white:#1E2225; --surface:#1E2225;
  --ok:#3F9873; --ok-100:#1D362B; --warn:#C79238; --warn-100:#332711;
  --danger:#C85555; --danger-100:#3A2020;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
[dir="rtl"]{font-family:"Segoe UI","Noto Sans Arabic",Tahoma,Arial,sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
a{color:var(--brand)}
.hidden{display:none !important}

/* ---------- Electron custom title bar ---------- */
#electron-titlebar{
  display:none;
  height:36px;flex:none;
  background:var(--brand-700);
  color:#EAF3F1;
  align-items:center;
  gap:10px;
  padding:0 0 0 12px;
  -webkit-app-region:drag;
  user-select:none;
  position:relative;z-index:100;
}
#electron-titlebar .tb-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;letter-spacing:.02em;flex:1}
#electron-titlebar .tb-logo svg{display:block;flex:none}
#electron-titlebar .tb-controls{display:flex;height:100%;-webkit-app-region:no-drag}
#electron-titlebar .tb-btn{width:46px;height:36px;display:grid;place-items:center;color:rgba(255,255,255,.8);font-size:13px;transition:background .1s}
#electron-titlebar .tb-btn:hover{background:rgba(255,255,255,.14);color:#fff}
#electron-titlebar .tb-btn.close:hover{background:#c42b1c;color:#fff}
#electron-titlebar .tb-btn svg{width:15px;height:15px}
/* ---------- App shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:var(--brand);color:#EAF3F1;display:flex;align-items:center;gap:14px;padding:10px 16px;box-shadow:0 6px 18px -12px rgba(0,0,0,.5)}
.topbar .logo{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.02em}
.topbar .logo svg{display:block}
.topbar .spacer{flex:1}
.topbar .who{font-size:12.5px;opacity:.85;text-align:end;line-height:1.2}
.topbar .who b{display:block;font-size:13.5px;opacity:1;letter-spacing:.01em}
.langsel{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 12px;font-size:13px}
.langsel:focus{outline:2px solid var(--gold)}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.1);color:#fff}
.icon-btn:hover{background:rgba(255,255,255,.2)}

.layout{flex:1;display:flex;min-height:0}
.nav{width:230px;flex:none;background:var(--surface);border-inline-end:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:4px}
.nav .navitem{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;color:var(--ink);font-weight:600;font-size:14.5px;text-align:start;width:100%}
.nav .navitem .ic{width:20px;height:20px;flex:none;color:var(--muted)}
.nav .navitem:hover{background:var(--brand-100)}
.nav .navitem.active{background:var(--brand);color:#fff}
.nav .navitem.active .ic{color:var(--gold)}
.nav .sep{height:1px;background:var(--line);margin:8px 6px}
.nav .navlabel{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:8px 13px 3px;font-weight:700}
.main{flex:1;min-width:0;overflow:auto;padding:24px clamp(16px,3vw,34px) 60px}

/* mobile nav */
.tabbar{display:none}
@media(max-width:860px){
  .nav{display:none}
  .main{padding:16px 14px 90px}
  .tabbar{display:flex;position:fixed;bottom:0;inset-inline:0;z-index:40;background:var(--surface);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:10px;color:var(--muted);font-size:10.5px;font-weight:600}
  .tabbar button .ic{width:22px;height:22px}
  .tabbar button.active{color:var(--brand)}
  .topbar .who .role{display:none}
}

/* ---------- Page header ---------- */
.page-head{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.page-head .titles h2{font-size:24px}
.page-head .titles p{margin:3px 0 0;color:var(--muted);font-size:13.5px}
.page-head .actions{margin-inline-start:auto;display:flex;gap:10px;flex-wrap:wrap}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:11px;font-weight:650;font-size:14px;background:var(--brand);color:#fff;transition:filter .12s,transform .04s;border:1px solid transparent}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translateY(1px)}
.btn .ic{width:18px;height:18px}
.btn.secondary{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn.secondary:hover{background:var(--brand-100);filter:none}
.btn.gold{background:var(--gold);color:#3a2c07}
.btn.ghost{background:transparent;color:var(--brand);border-color:transparent}
.btn.ghost:hover{background:var(--brand-100);filter:none}
.btn.danger{background:var(--danger)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn.block{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.stat .k{font-size:12.5px;color:var(--muted);font-weight:600;letter-spacing:.02em}
.stat .v{font-size:26px;font-weight:750;margin-top:6px;letter-spacing:-.02em}
.stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
.stat .corner{position:absolute;inset-block-start:-14px;inset-inline-end:-14px;width:66px;height:66px;opacity:.10;color:var(--brand)}
.stat.gold .v{color:var(--brand-700)}
.stat.warn .v{color:var(--warn)}
.stat.danger .v{color:var(--danger)}

/* ---------- Table ---------- */
.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{text-align:start;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:12px 14px;background:#FBFAF8;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FBFAF8}
.t-right{text-align:end}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.num{font-variant-numeric:tabular-nums;font-weight:650}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:650;line-height:1.6}
.badge.green{background:var(--ok-100);color:var(--ok)}
.badge.gold{background:var(--gold-soft);color:#8a6a1a}
.badge.red{background:var(--danger-100);color:var(--danger)}
.badge.grey{background:#EEEDEA;color:var(--muted)}
.badge.brand{background:var(--brand-100);color:var(--brand-700)}
.badge.warnb{background:var(--warn-100);color:var(--warn)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* ---------- Forms ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:650;color:#40433f}
.field .hint{font-size:12px;color:var(--muted);font-weight:400}
input[type=text],input[type=number],input[type=tel],input[type=date],input[type=search],input[type=password],select,textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:520px){.row2,.row3{grid-template-columns:1fr}}
.seg{display:inline-flex;background:#EEEDEA;border-radius:10px;padding:3px;gap:2px}
.seg button{padding:8px 14px;border-radius:8px;font-weight:650;font-size:13.5px;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--brand);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.check{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;cursor:pointer}
.check input{width:18px;height:18px;accent-color:var(--brand)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(18,22,20,.46);display:grid;place-items:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:18px;width:min(560px,100%);max-height:92vh;overflow:auto;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
.modal.lg{width:min(760px,100%)}
.modal-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:18px}
.modal-head .x{margin-inline-start:auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.modal-head .x:hover{background:#EEEDEA}
.modal-body{padding:20px}
.modal-foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}

/* ---------- Toast ---------- */
#toasts{position:fixed;z-index:120;bottom:20px;inset-inline:0;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:0 10px 30px -8px rgba(0,0,0,.5);animation:pop .2s ease;max-width:90vw}
.toast.ok{background:var(--ok)} .toast.err{background:var(--danger)}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

/* ---------- Empty ---------- */
.empty{text-align:center;padding:54px 20px;color:var(--muted)}
.empty svg{width:52px;height:52px;opacity:.4;margin-bottom:12px}
.empty h4{color:var(--ink);font-size:16px;margin-bottom:4px}

/* ---------- POS ---------- */
.pos{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
@media(max-width:960px){.pos{grid-template-columns:1fr}}
.prodgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:start;transition:transform .06s,box-shadow .12s;position:relative}
/* ---------- Tablet mode: larger touch targets ---------- */
body.tablet .btn{padding:14px 22px;font-size:16px;border-radius:14px}
body.tablet .btn.sm{padding:10px 16px;font-size:14px}
body.tablet input,body.tablet select,body.tablet textarea{padding:13px 14px;font-size:16px}
body.tablet .navitem{padding:14px 16px;font-size:16px}
body.tablet .pcard{padding:18px}
body.tablet .icon-btn{width:48px;height:48px}
body.tablet .qbtn{width:38px;height:38px;font-size:18px}
body.tablet table td,body.tablet table th{padding:12px 10px;font-size:15px}
.pcard:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.pcard .nm{font-weight:700;font-size:14px;line-height:1.25}
.pcard .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.pcard .pr{margin-top:9px;font-weight:750;color:var(--brand-700)}
.pcard .q{position:absolute;top:9px;inset-inline-end:9px;font-size:11px;font-weight:700;color:var(--brand-700);background:rgba(255,255,255,.92);padding:1px 8px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.pcard.out{opacity:.5}
.pcard .ph{height:96px;border-radius:9px;background:var(--brand-100);display:grid;place-items:center;overflow:hidden;margin-bottom:9px;color:var(--brand)}
.pcard .ph img{width:100%;height:100%;object-fit:cover}
.pcard .ph svg{width:30px;height:30px;opacity:.4}
.pthumb{width:42px;height:42px;border-radius:9px;background:var(--brand-100);display:grid;place-items:center;overflow:hidden;flex:none;color:var(--brand)}
.pthumb img{width:100%;height:100%;object-fit:cover}
.pthumb svg{width:19px;height:19px;opacity:.5}
.photoRow{display:flex;gap:14px;align-items:center}
.photoPrev{width:90px;height:90px;border-radius:12px;background:var(--brand-100);display:grid;place-items:center;overflow:hidden;flex:none;color:var(--brand);border:1px solid var(--line)}
.photoPrev img{width:100%;height:100%;object-fit:cover}
.photoPrev svg{width:34px;height:34px;opacity:.4}
.photoBtns{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
/* Receipt preview */
.rcpt-preview{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;justify-content:center;max-height:55vh;overflow-y:auto}
.rcpt-preview-inner{width:272px;font-family:monospace;font-size:12px;line-height:1.55}
/* Signature pad */
.sigwrap{margin-top:16px}
.sigwrap label{font-size:13px;font-weight:650;color:#40433f;display:block;margin-bottom:6px}
.sigpad{border:1.5px dashed var(--line);border-radius:10px;background:#fff;touch-action:none;display:block;width:100%}
.sigpad:active,.sigpad.drawing{border-color:var(--brand)}
.sigtools{display:flex;justify-content:flex-end;margin-top:6px}
.sig-img-wrap{margin-top:6px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
.cart{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);position:sticky;top:78px;display:flex;flex-direction:column;max-height:calc(100vh - 100px)}
.cart h3{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.cart .items{flex:1;overflow:auto;padding:6px 8px;min-height:60px}
.citem{display:flex;align-items:center;gap:8px;padding:8px;border-radius:9px}
.citem:hover{background:#FBFAF8}
.citem .nm{flex:1;font-size:13.5px;font-weight:600;line-height:1.2}
.citem .nm small{display:block;color:var(--muted);font-weight:500}
.qbtn{width:26px;height:26px;border-radius:7px;background:#EEEDEA;display:grid;place-items:center;font-weight:800;color:var(--brand-700)}
.qbtn:hover{background:var(--brand-100)}
.cart .foot{border-top:1px solid var(--line);padding:14px 16px}
.cart .line{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:6px;color:var(--muted)}
.cart .line.total{font-size:19px;font-weight:800;color:var(--ink);margin-top:6px}

/* barcode print */
.label-svg{background:#fff}
.receipt,.rentagr{display:none}

/* login */
.auth{min-height:100vh;display:grid;place-items:center;padding:20px;background:
  radial-gradient(1200px 500px at 50% -10%, #12564d 0%, transparent 60%),
  linear-gradient(160deg,#0E4D45,#0A3A34)}
.authcard{width:min(420px,100%);background:var(--surface);border-radius:22px;box-shadow:0 30px 80px -30px rgba(0,0,0,.7);overflow:hidden}
.authcard .cap{padding:30px 30px 8px;text-align:center}
.authcard .cap .mark{width:60px;height:60px;margin:0 auto 12px;border-radius:16px;background:var(--brand);display:grid;place-items:center}
.authcard .cap h1{font-size:22px}
.authcard .cap p{color:var(--muted);font-size:13.5px;margin-top:4px}
.authcard .body{padding:14px 30px 30px}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.pinpad button{padding:16px;border-radius:12px;background:var(--paper);font-size:20px;font-weight:700;border:1px solid var(--line)}
.pinpad button:hover{background:var(--brand-100)}
.pindisp{display:flex;justify-content:center;gap:12px;margin:8px 0 16px}
.pindot{width:15px;height:15px;border-radius:50%;border:2px solid var(--line)}
.pindot.on{background:var(--brand);border-color:var(--brand)}
.userchips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
.userchip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:7px}
.userchip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.userchip .av{width:22px;height:22px;border-radius:50%;background:var(--gold-soft);color:#8a6a1a;display:grid;place-items:center;font-size:11px;font-weight:800}
.userchip.on .av{background:rgba(255,255,255,.2);color:#fff}

.subtle{color:var(--muted);font-size:13px}
.divider{height:1px;background:var(--line);margin:18px 0}
.pill-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-grid.cal-head{margin-bottom:6px;font-size:12px;font-weight:700;color:var(--muted);text-align:center}
.cal-cell{min-height:78px;border:1px solid var(--line);border-radius:8px;padding:5px;font-size:11px;background:var(--paper);overflow:hidden}
.cal-cell.empty{border:none;background:transparent}
.cal-cell.today{border-color:var(--brand);background:var(--brand-100)}
.cal-daynum{font-weight:700;font-size:12px;margin-bottom:3px}
.cal-chip{border-radius:5px;padding:2px 5px;margin-bottom:2px;font-size:10px;font-weight:650;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-chip.brand{background:var(--brand)}
.cal-chip.gold{background:var(--gold);color:#3a2e0f}
.cal-chip.red{background:var(--danger)}
.pill-tabs button{padding:8px 15px;border-radius:999px;font-weight:650;font-size:13.5px;background:var(--surface);border:1px solid var(--line);color:var(--muted)}
.pill-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.searchbar{position:relative;margin-bottom:16px}
.searchbar input{padding-inline-start:40px}
.searchbar .ic{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:18px;height:18px}
kbd{background:#EEEDEA;border-radius:5px;padding:1px 6px;font-size:11px;font-family:var(--font);border:1px solid var(--line)}

/* ---------- Clients / Customers ---------- */
.clientgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.clientcard{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;gap:14px;align-items:flex-start;text-align:start;transition:transform .06s,box-shadow .12s;width:100%}
.clientcard:hover{transform:translateY(-1px);box-shadow:0 4px 14px -6px rgba(20,25,23,.28)}
.clientcard .rank{position:absolute;inset-inline-start:-9px;inset-block-start:-9px;min-width:26px;height:26px;padding:0 6px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:800;background:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.clientcard .rank.r1{background:linear-gradient(135deg,#E8C15A,#C9A34E);color:#4a3708}
.clientcard .rank.r2{background:linear-gradient(135deg,#Cfd3d6,#A9B0B4);color:#33383b}
.clientcard .rank.r3{background:linear-gradient(135deg,#D9A066,#B87333);color:#3a230c}
.cli-av{width:56px;height:56px;border-radius:14px;flex:none;overflow:hidden;background:var(--gold-soft);color:#8a6a1a;display:grid;place-items:center;font-size:19px;font-weight:800;border:1px solid var(--line)}
.cli-av img{width:100%;height:100%;object-fit:cover}
.cli-main{flex:1;min-width:0}
.cli-name{font-weight:750;font-size:15.5px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;overflow-wrap:anywhere}
.cli-phone{font-size:12.5px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.cli-stars{margin-top:5px;font-size:14px;letter-spacing:1px;line-height:1}
.cli-stars .on{color:var(--gold)} .cli-stars .off{color:var(--line)}
.cli-meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:9px;font-size:12px;color:var(--muted)}
.cli-meta b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.cli-score{flex:none;text-align:center;min-width:58px}
.cli-score .n{font-size:26px;font-weight:800;color:var(--brand-700);line-height:1;font-variant-numeric:tabular-nums}
.cli-score .l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:3px}
.cli-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}

/* Barcodes: wrapper carries sizing, inner svg scales proportionally (has viewBox) */
.bc-wrap{text-align:center}
.bc-svg{display:block;max-width:100%;height:auto;margin:0 auto}

@media print{
  /* Remove the app UI from layout entirely (not just visibility:hidden, which keeps
     its height and spilled the receipt across 5-6 pages, most of them blank). */
  #app,#modalRoot,#toasts{display:none !important}
  #printArea{position:static;margin:0;width:76mm;box-sizing:border-box;padding:0}
  #printArea.report{width:100%}
  @page{size:76mm auto;margin:1mm}
  @page report-page{size:auto;margin:14mm}
  #printArea.report{page:report-page}
  #printArea.labels{width:60mm}
  @page label-page{size:60mm 40mm;margin:1mm}
  #printArea.labels{page:label-page}
}

function t(k){ return (I18N[State.lang] && I18N[State.lang][k]) || I18N.en[k] || k; }

/* ---------------- IndexedDB ---------------- */
const DB_NAME='kaftanStoreDB', DB_VER=5;
const STORES=['meta','users','products','sales','rentals','customers','payments','expenses','activity','parked'];
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });
      // _fs holds the linked "Store Data" folder handle; kept out of STORES so
      // backup/restore/reset never touch it.
      if(!db.objectStoreNames.contains('_fs')) db.createObjectStore('_fs',{keyPath:'id'});
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
function tx(store,mode='readonly'){ return State.db.transaction(store,mode).objectStore(store); }
function idbAll(store){ return new Promise((res,rej)=>{ const r=tx(store).getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }
function idbGet(store,id){ return new Promise((res,rej)=>{ const r=tx(store).get(id); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbPut(store,val){ return new Promise((res,rej)=>{ const r=tx(store,'readwrite').put(val); r.onsuccess=()=>res(val); r.onerror=()=>rej(r.error); }); }
function idbDel(store,id){ return new Promise((res,rej)=>{ const r=tx(store,'readwrite').delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function idbClear(store){ return new Promise((res,rej)=>{ const r=tx(store,'readwrite').clear(); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

/* ---------------- Helpers ---------------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function hashPin(pin){ let h=5381; const s='kf7$'+pin; for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&0xffffffff;} return (h>>>0).toString(16); }
function money(n){ n=Number(n||0); const s=n.toLocaleString('en-US',{maximumFractionDigits:2}); return isRTL()? s+' دج' : s+' DZD'; }
/* Local-timezone YYYY-MM-DD (toISOString is UTC and shifts the date for UTC+ zones) */
function localISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return localISO(new Date()); }
function now(){ return Date.now(); }
function startOf(period){
  const d=new Date(); d.setHours(0,0,0,0);
  if(period==='today') return d.getTime();
  if(period==='week'){ const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d.getTime(); }
  if(period==='month'){ d.setDate(1); return d.getTime(); }
  return 0;
}
// Returns {from,to} epoch ms for a period key OR explicit custom range {from:'YYYY-MM-DD',to:'YYYY-MM-DD'}
function dateRangeFor(period,customFrom,customTo){
  if(period==='custom' && customFrom){
    const from=new Date(customFrom+'T00:00:00').getTime();
    const to=customTo? new Date(customTo+'T23:59:59').getTime() : Date.now();
    return {from,to};
  }
  if(period==='day' && customFrom){
    const from=new Date(customFrom+'T00:00:00').getTime();
    const to=new Date(customFrom+'T23:59:59').getTime();
    return {from,to};
  }
  return {from:startOf(period), to:Date.now()};
}
function fmtDate(ts){ const d=new Date(ts); return d.toLocaleDateString(State.lang==='ar'?'ar':(State.lang==='fr'?'fr-FR':'en-GB'),{day:'2-digit',month:'short',year:'numeric'}); }
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- Barcode rendering with JsBarcode (Code128) ---------------- */
function renderBarcodeHtml(data, opts){
  opts = opts || {};
  const containerId = 'bc_' + uid();
  // JsBarcode only renders into <svg>/<canvas>/<img> (a <div> throws "Not supported")
  // and it overwrites the target's inline style — so sizing lives on the wrapper div
  // (which JsBarcode never touches) and the svg scales via the .bc-svg class.
  const wrapStyle = opts.style ? ` style="${opts.style}"` : '';
  return {
    html: `<div class="bc-wrap"${wrapStyle}><svg class="bc-svg" id="${containerId}" data-barcode="${esc(String(data))}" data-height="${opts.height||50}"></svg></div>`,
    id: containerId
  };
}
function renderAllBarcodes(){
  if(typeof JsBarcode==='undefined') return;
  document.querySelectorAll('svg[data-barcode]').forEach(el=>{
    const code = el.getAttribute('data-barcode');
    const height = parseInt(el.getAttribute('data-height')||50);
    if(!code) return;
    try {
      JsBarcode(el, code, {format:"CODE128", height:height, margin:2, lineColor:"#000"});
    } catch(e){}
  });
}

/* ---------------- Toast / Modal ---------------- */
function toast(msg,type){ const el=document.createElement('div'); el.className='toast '+(type||''); el.textContent=msg; document.getElementById('toasts').appendChild(el); setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2200); }
function toastUndo(msg,undoFn){
  const el=document.createElement('div'); el.className='toast';
  el.style.display='flex'; el.style.alignItems='center'; el.style.gap='10px';
  el.innerHTML=`<span>${esc(msg)}</span><button style="background:rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;font-weight:700;font-size:12px">${esc(t('undo'))}</button>`;
  document.getElementById('toasts').appendChild(el);
  let done=false;
  el.querySelector('button').onclick=async()=>{ if(done)return; done=true; await undoFn(); el.remove(); toast(t('undone'),'ok'); };
  setTimeout(()=>{ if(done)return; el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },6000);
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function modal(title,bodyHTML,footHTML,opts){
  opts=opts||{};
  document.getElementById('modalRoot').innerHTML=`
   <div class="overlay" id="ovl">

       <div class="modal-body">${bodyHTML}</div>

     </div>

  document.getElementById('mx').onclick=closeModal;

}
function confirmDialog(msg,onYes,danger){

    `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
     <button class="btn ${danger?'danger':''}" id="cfy">${esc(t('confirm'))}</button>`);

async function findDupByPhone(phone){

async function logAct(action,detail,productId){

/* Runs onOk(how) if authorized. Owner passes through; cashier must enter the manager code. */
async function requireAuth(onOk){
  if(isOwner()){ onOk('owner'); return; }
  const m=await idbGet('meta','app');
  if(!m || !m.authCode){ toast(t('noCodeSet'),'err'); return; }
  modal(t('authRequired'),
   `<p class="subtle" style="margin:2px 0 12px">${svg(IC.lock)} ${esc(t('enterMgrCode'))}</p>
    <div class="field"><input id="authIn" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autofocus></div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="authGo">${esc(t('confirm'))}</button>`);
  const inp=document.getElementById('authIn'); setTimeout(()=>inp&&inp.focus(),40);
  const go=()=>{ if(hashPin((inp.value||'').trim())===m.authCode){ closeModal(); onOk('code'); } else { toast(t('wrongCode'),'err'); inp.value=''; inp.focus(); } };
  document.getElementById('authGo').onclick=go;
  inp.onkeydown=e=>{ if(e.key==='Enter') go(); };
}
/* Delete with confirmation; cashiers must pass the manager code. Logs the deletion. */
function guardDelete(store,id,actionKey,detail,onDone,msg){
  confirmDialog(msg||t('deleteConfirm'),()=>{
    requireAuth(async(how)=>{
      const original=await idbGet(store,id);
      await idbDel(store,id);
      await logAct(actionKey,(detail||'')+(how==='code'?(' · '+t('authorizedBy')):''));
      toastUndo(t('deleted'), async()=>{ if(original) await idbPut(store,original); onDone&&onDone(); });
      onDone&&onDone();
    });
  },true);
}
function actLabel(a){ return t(a)||a; }
function actBadge(a){
  const red=['logRefund','logProdDel','logExpDel','logStaffDel'];
  const green=['logSale','logPayment','logReturn'];
  const gold=['logRental'];
  const cls=red.includes(a)?'red':green.includes(a)?'green':gold.includes(a)?'gold':(a==='logLogin'?'brand':'grey');
  return `<span class="badge ${cls}">${esc(actLabel(a))}</span>`;
}

/* ---------------- Data access shortcuts ---------------- */
async function getProducts(){ return (await idbAll('products')).sort((a,b)=>b.createdAt-a.createdAt); }
async function getCustomers(){ return await idbAll('customers'); }
async function customerBalance(cid){
  const sales=(await idbAll('sales')).filter(s=>s.customerId===cid && !s.voided);
  const rentals=(await idbAll('rentals')).filter(r=>r.customerId===cid && r.status!=='cancelled');
  let owed=0;
  sales.forEach(s=>owed+=Math.max(0,(s.total||0)-(s.paid||0)));
  rentals.forEach(r=>owed+=Math.max(0,(r.price||0)+(r.lateFee||0)-(r.paid||0)));
  return Math.max(0,owed);
}

/* ---------------- LOGIN ---------------- */
async function renderLogin(){
  const users=(await idbAll('users')).filter(u=>u.active!==false);
  let selected=users[0]; let pin='';
  const app=document.getElementById('app');
  function draw(){
    app.innerHTML=`
    <div class="auth">
      <div class="authcard">
        <div class="cap">
          <div class="mark">${logoSVG(30,'#C9A34E')}</div>
          <h1>${esc(State.storeName||t('app'))}</h1>
          <p>${esc(t('chooseUser'))}</p>
        </div>
        <div class="body">
          <div class="userchips">
            ${users.map(u=>`<button class="userchip ${u.id===selected.id?'on':''}" data-u="${u.id}">
              <span class="av">${esc(initials(u.name))}</span>${esc(u.name)}</button>`).join('')}
          </div>
          <p class="subtle" style="text-align:center">${esc(t('enterPin'))}</p>
          <div class="pindisp">${[0,1,2,3,4,5].map(i=>`<span class="pindot ${i<pin.length?'on':''}"></span>`).join('')}</div>
          <div class="pinpad">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-n="${n}">${n}</button>`).join('')}
            <button data-act="del">⌫</button>
            <button data-n="0">0</button>
            <button data-act="ok" style="background:var(--brand);color:#fff">${svg(IC.check,'')}</button>
          </div>
          <div style="text-align:center;margin-top:14px">${langInline()}</div>
        </div>
      </div>
    </div>`;
    app.querySelectorAll('.userchip').forEach(b=>b.onclick=()=>{ selected=users.find(u=>u.id===b.dataset.u); pin=''; draw(); });
    app.querySelectorAll('.pinpad button').forEach(b=>b.onclick=()=>{
      if(b.dataset.n!=null){ if(pin.length<6){pin+=b.dataset.n; draw();} }
      else if(b.dataset.act==='del'){ pin=pin.slice(0,-1); draw(); }
      else if(b.dataset.act==='ok'){ submit(); }
    });
    bindLangInline(draw);
    if(pin.length>=4) {/*allow ok*/}
  }
  function submit(){
    if(hashPin(pin)===selected.pin){ State.user=selected; logAct('logLogin'); toast(t('welcome')+', '+selected.name.split(' ')[0],'ok'); render(); }
    else { toast(t('wrongPin'),'err'); pin=''; draw(); }
  }
  document.onkeydown=e=>{ if(document.querySelector('.auth')){ if(/^\d$/.test(e.key)&&pin.length<6){pin+=e.key;draw();} else if(e.key==='Backspace'){pin=pin.slice(0,-1);draw();} else if(e.key==='Enter'){submit();} } };
  draw();
}

async function tillTotals(){
  const meta=await idbGet('meta','app');
  const since = meta.tillSetAt || 0;
  const float = meta.tillFloat || 0;
  const [payments,expenses]=await Promise.all([idbAll('payments'),idbAll('expenses')]);
  // Single source of truth: the payments journal. Every cash movement writes here:
  // sale, rental, deposit, repayment (positive) / refund, void, depositRefund (negative)
  const cashJ=payments.filter(p=>p.createdAt>=since && (p.method||'cash')==='cash');
  const sumBy=types=>cashJ.filter(p=>types.includes(p.refType)).reduce((a,p)=>a+(p.amount||0),0);
  const cashSales=sumBy(['sale']);
  const cashRentals=sumBy(['rental']);
  const cashDeposits=sumBy(['deposit']);
  const cashPayments=sumBy(['repayment']);
  const cashRefunds=sumBy(['refund','void','depositRefund']); // negative
  const cashExpenses=expenses.filter(x=>x.createdAt>=since && !x.isWithdrawal).reduce((a,x)=>a+(x.amount||0),0);
  const withdrawals=expenses.filter(x=>x.createdAt>=since && x.isWithdrawal).reduce((a,x)=>a+(x.amount||0),0);
  const cashIn=cashSales+cashRentals+cashDeposits+cashPayments;
  const cashOut=cashExpenses+withdrawals-cashRefunds; // cashRefunds is negative, so subtracting adds its magnitude
  const till=float+cashIn-cashOut;
  return {float,cashSales,cashRentals,cashDeposits,cashPayments,cashRefunds,cashIn,cashExpenses,withdrawals,cashOut,till,since};
}

let stockSearch='', stockCat='';
async function openReorderModal(products){
  const low=products.filter(p=>p.mode!=='rent' && (p.qty||0)<=(p.lowStock??3)).sort((a,b)=>(a.qty||0)-(b.qty||0));
  const listText=low.map(p=>{
    const need=Math.max(1,((p.lowStock??3)*2)-(p.qty||0));
    return `• ${p.name}${p.size?' ('+p.size+')':''} — ${t('inStock')}: ${p.qty||0}${p.supplier?' — '+p.supplier:''}`;
  }).join('\n');
  const header=`${State.storeName} — ${t('reorderList')} — ${fmtDate(now())}`;
  const fullText=header+'\n\n'+listText;
  modal(t('reorderList'),
   `<p class="subtle" style="margin-bottom:12px">${esc(t('reorderHint'))}</p>
    <div class="tablewrap" style="max-height:44vh"><table><thead><tr><th>${esc(t('name'))}</th><th class="t-right">${esc(t('inStock'))}</th><th>${esc(t('supplier'))||''}</th></tr></thead>

   `<button class="btn secondary" onclick="closeModal()">${esc(t('close'))}</button>

    <button class="btn" id="ro_copy">${esc(t('copyList'))}</button>`,{lg:true});
  document.getElementById('ro_copy').onclick=async()=>{
    try{ await navigator.clipboard.writeText(fullText); toast(t('copied'),'ok'); }
    catch(e){ const ta=document.createElement('textarea'); ta.value=fullText; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); toast(t('copied'),'ok');}catch(_){ toast(t('copyFailed'),'err'); } document.body.removeChild(ta); }

  </div>`);
}

async function openRestockModal(p){
  if(!p) return;
  modal(t('addStock'),
   `<p style="font-weight:700;font-size:16px;margin-bottom:2px">${esc(p.name)}</p>
    <p class="subtle" style="margin-bottom:14px">${esc(t('currentStock'))}: <b>${p.qty||0}</b></p>
    <div class="field"><label>${esc(t('qtyToAdd'))} *</label><input id="rs_qty" type="number" min="1" step="1" value="1" autofocus></div>
    <div class="field"><label>${esc(t('newCost'))} (${esc(t('optional'))})</label><input id="rs_cost" type="number" min="0" step="0.01" value="${p.costPrice||''}" placeholder="${esc(t('cost'))}"></div>
    <div class="field"><label>${esc(t('supplierOpt'))}</label><input id="rs_supplier" type="text" value="${esc(p.supplier||'')}" placeholder="${esc(t('optional'))}"></div>
    <p class="subtle" id="rs_preview" style="margin-top:6px"></p>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="rs_go">${esc(t('addStock'))}</button>`);
  const qtyI=document.getElementById('rs_qty'), prev=document.getElementById('rs_preview');
  function syncPreview(){ const add=Math.max(0,parseInt(qtyI.value||0)); prev.textContent = `${p.name}: ${p.qty||0} → ${(p.qty||0)+add}`; }
  qtyI.oninput=syncPreview; syncPreview();
  document.getElementById('rs_go').onclick=async()=>{
    const add=Math.max(0,parseInt(qtyI.value||0));
    if(add<=0){ toast(t('required'),'err'); return; }
    const newCost=Number(document.getElementById('rs_cost').value||0);
    const supplier=document.getElementById('rs_supplier').value.trim();
    p.qty=(p.qty||0)+add;
    if(isOwner() && newCost>0) p.costPrice=newCost;
    if(supplier) p.supplier=supplier;
    await idbPut('products',p);
    await logAct('logRestock', `${p.name} +${add} (${p.qty})`, p.id);
    closeModal(); toast(t('stockAdded'),'ok'); viewStock();
  };
}

/* Build the inner receipt HTML string (used for both preview and actual print) */
function wrapReceiptInner(innerHtml){

/*
  showReceiptPreview — the unified preview modal.
  opts = {
    title: string,
    receiptHtml: string,     // what goes inside the 72mm frame (same html used to print)
    signature: bool,         // show signature pad?
    rentalId: string|null,   // if set, saves sig to that rental record
    onPrint: fn(sigDataUrl)  // called when user taps Print; receives sig data url or null
  }
*/
function showReceiptPreview(opts){
  const {title, receiptHtml, signature, rentalId, onPrint, hint} = opts;
  const sigSection = signature ? `
    <div class="sigwrap">
      <label>${esc(t('signature'))} <span class="subtle">(${esc(t('optional'))})</span></label>
      <canvas class="sigpad" id="sigCanvas" height="130"></canvas>
      <div class="sigtools">
        <button class="btn ghost sm" id="sigClear" type="button">${esc(t('clearSig'))}</button>
      </div>
    </div>` : '';

  modal(title,
    `<div class="rcpt-preview" id="rcptPreviewBox">
       ${wrapReceiptInner(receiptHtml)}
     </div>
     ${sigSection}
     <p class="subtle" style="font-size:12px;margin-top:12px">
       ${esc(hint || (State.lang==='ar'?'اختر طابعة XP-350B ومقاس 76مم في نافذة الطباعة.':
             State.lang==='fr'?"Choisissez l'imprimante XP-350B et le format 76mm dans la boîte de dialogue.":
             'Select the XP-350B printer and 76mm paper in the print dialog.'))}
     </p>`,
    `<button class="btn secondary" onclick="closeModal()">${esc(t('close'))}</button>
     <button class="btn" id="doPrintBtn">${svg(IC.print,'ic')}${esc(t('print'))}</button>`,
    {lg: true}
  );

  /* ---- Signature pad ---- */
  let sigDataUrl = null;
  if(signature){
    const canvas = document.getElementById('sigCanvas');
    // Make canvas fill its container width
    const resize = ()=>{ canvas.width = canvas.offsetWidth; };
    resize();
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#111';
    let drawing = false, hasSig = false, lastX = 0, lastY = 0;

    function getXY(e){
      const r = canvas.getBoundingClientRect();
      if(e.touches){ return [e.touches[0].clientX-r.left, e.touches[0].clientY-r.top]; }
      return [e.clientX-r.left, e.clientY-r.top];
    }
    function start(e){ e.preventDefault(); drawing=true; hasSig=true; canvas.classList.add('drawing'); const [x,y]=getXY(e); lastX=x; lastY=y; ctx.beginPath(); ctx.moveTo(x,y); }
    function move(e){ e.preventDefault(); if(!drawing) return; const [x,y]=getXY(e); ctx.lineTo(x,y); ctx.stroke(); lastX=x; lastY=y; }
    function end(e){ if(!drawing) return; drawing=false; canvas.classList.remove('drawing'); if(hasSig) sigDataUrl=canvas.toDataURL('image/png'); }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);

    document.getElementById('sigClear').onclick = ()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      hasSig=false; sigDataUrl=null;
    };
  }

  /* ---- Print button ---- */
  document.getElementById('doPrintBtn').onclick = async ()=>{
    // If rental + has signature, save it to the rental record first
    if(rentalId && sigDataUrl){
      try{
        const r = await idbGet('rentals', rentalId);
        if(r){ r.signature = sigDataUrl; await idbPut('rentals', r); }
      }catch(e){}
    }
    closeModal();
    onPrint(sigDataUrl);
  };

  setTimeout(renderAllBarcodes, 50);
}

/* Resize + compress an uploaded/captured image to a small JPEG data URL (~40-80KB). */
function processImage(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=600; let w=img.width, h=img.height;
        if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
        else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        try{ res(c.toDataURL('image/jpeg',0.6)); }catch(err){ rej(err); }
      };
      img.onerror=rej; img.src=fr.result;
    };
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

/* -------- Lightweight inline SVG charts (no external library, fully offline) -------- */
function barChartSvg(labels,series,opts){
  opts=opts||{};
  const w=opts.width||560, h=opts.height||180, pad=28;
  const max=Math.max(1,...series.map(s=>Math.max(...s.values,0)));
  const n=labels.length;
  const groupW=(w-pad*2)/n;
  const barCount=series.length;
  const barW=Math.min(28,(groupW*0.7)/barCount);
  let bars='', axisLabels='';
  for(let i=0;i<n;i++){
    const gx=pad+i*groupW+groupW/2;
    series.forEach((s,si)=>{
      const val=s.values[i]||0;
      const bh=max>0? (val/max)*(h-pad-16) : 0;
      const bx=gx-(barCount*barW)/2+si*barW;
      bars+=`<rect x="${bx.toFixed(1)}" y="${(h-pad-bh).toFixed(1)}" width="${(barW-3).toFixed(1)}" height="${bh.toFixed(1)}" fill="${s.color}" rx="2"><title>${esc(s.name)} ${esc(labels[i])}: ${money2(val)}</title></rect>`;
    });
    axisLabels+=`<text x="${gx.toFixed(1)}" y="${h-8}" font-size="9.5" text-anchor="middle" fill="var(--muted)">${esc(labels[i])}</text>`;
  }
  const legend=series.map((s,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;margin-inline-end:14px;font-size:12px"><span style="width:10px;height:10px;background:${s.color};border-radius:3px;display:inline-block"></span>${esc(s.name)}</span>`).join('');
  return `<div>${legend?`<div style="margin-bottom:8px">${legend}</div>`:''}<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-width:${w}px" preserveAspectRatio="xMinYMin meet">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="var(--line)" stroke-width="1"/>
    ${bars}${axisLabels}
  </svg></div>`;
}
function donutSvg(segments,opts){
  opts=opts||{};
  const size=opts.size||150, cx=size/2, cy=size/2, r=size/2-10, stroke=opts.stroke||20;
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  const circ=2*Math.PI*r;
  let cumulative=0, paths='';
  segments.forEach(s=>{
    const frac=s.value/total;
    const dash=frac*circ;
    const offset=-cumulative;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"><title>${esc(s.name)}: ${money2(s.value)} (${Math.round(frac*100)}%)</title></circle>`;
    cumulative+=dash;
  });
  const legend=segments.map(s=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px"><span style="width:10px;height:10px;background:${s.color};border-radius:3px;display:inline-block"></span>${esc(s.name)}: <b class="mono">${money2(s.value)}</b></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;transform:rotate(-90deg)">${paths}</svg>
    <div>${legend}</div>
  </div>`;
}

async function buildRentalCalendar(rentals){
  const relevant=rentals.filter(r=>r.status==='active'||r.status==='reserved');
  const first=new Date(calYear,calMonth,1);
  const startWeekday=(first.getDay()+6)%7; // Monday=0
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const byDay={};
  relevant.forEach(r=>{
    const dateStr = r.status==='reserved' ? r.startDate : r.dueDate;
    if(!dateStr) return;
    const d=new Date(dateStr);
    if(d.getFullYear()===calYear && d.getMonth()===calMonth){ const key=d.getDate(); (byDay[key]=byDay[key]||[]).push(r); }
  });
  const monthLabel=first.toLocaleDateString(State.lang,{month:'long',year:'numeric'});
  let cells='';
  for(let i=0;i<startWeekday;i++) cells+=`<div class="cal-cell empty"></div>`;
  const todayStr=todayISO();
  for(let day=1;day<=daysInMonth;day++){
    const cellDate=localISO(new Date(calYear,calMonth,day));
    const items=byDay[day]||[];
    const isToday=cellDate===todayStr;
    cells+=`<div class="cal-cell${isToday?' today':''}">
      <div class="cal-daynum">${day}</div>
      ${items.slice(0,3).map(r=>`<div class="cal-chip ${r.status==='reserved'?'brand':(r.dueDate&&Date.parse(r.dueDate)<Date.now()?'red':'gold')}" data-calitem="${r.id}">${esc(r.name)}</div>`).join('')}
      ${items.length>3?`<div class="subtle" style="font-size:10px">+${items.length-3} ${esc(t('more'))}</div>`:''}
    </div>`;
  }
  const weekdayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>t(d.toLowerCase())||d);
  return `<div class="card pad">
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <button class="btn ghost sm" id="calPrev">‹</button>
      <h3 style="margin:0 10px">${esc(monthLabel)}</h3>
      <button class="btn ghost sm" id="calNext">›</button>
      <button class="btn secondary sm" id="calToday" style="margin-inline-start:auto">${esc(t('today'))}</button>
    </div>
    <div class="cal-grid cal-head">${weekdayNames.map(d=>`<div>${esc(d)}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div style="display:flex;gap:14px;margin-top:12px;font-size:12px" class="subtle">
      <span><span class="dot" style="background:var(--brand);display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-end:4px"></span>${esc(t('reserved'))}</span>
      <span><span class="dot" style="background:var(--gold);display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-end:4px"></span>${esc(t('rented'))}</span>
      <span><span class="dot" style="background:var(--danger);display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-end:4px"></span>${esc(t('overdue'))}</span>
    </div>
  </div>`;
}
async function activateReservation(r){
  if(!r) return;
  const p=await idbGet('products',r.productId);
  if(p){ if((p.qty||0)<=0){ toast(t('outOfStock'),'err'); return; } p.qty=Math.max(0,(p.qty||0)-1); await idbPut('products',p); await logAct('logStockRent', `${p.name} -1 (${p.qty})`, p.id); }
  r.status='active';
  await idbPut('rentals',r);
  await logAct('logRental', r.name+' · '+(r.customerName||''));
  toast(t('rentalDone'),'ok'); viewRentals();
}
/* Cancel a rental or reservation: restore stock (only if it was checked out),
   reverse any rent paid + deposit in the till, and mark it cancelled so it
   drops out of balances, points and reports. Cashiers need the manager code. */
async function cancelRental(r){
  if(!r || (r.status!=='active' && r.status!=='reserved')) return;
  confirmDialog(t('cancelRentalConfirm'),()=>{
    requireAuth(async(how)=>{
      const method=r.method||'cash';
      // reversing money that came in
      if((r.paid||0)>0) await idbPut('payments',{id:uid(),customerId:r.customerId||null,refType:'refund',amount:-(r.paid||0),method,createdAt:now(),userId:State.user.id});
      if((r.deposit||0)>0 && !r.depositRefunded) await idbPut('payments',{id:uid(),customerId:r.customerId||null,refType:'depositRefund',amount:-(r.deposit||0),method,createdAt:now(),userId:State.user.id});
      // an active rental had a unit removed from stock; a reservation did not
      if(r.status==='active' && r.productId){ const p=await idbGet('products',r.productId); if(p){ p.qty=(p.qty||0)+1; await idbPut('products',p); await logAct('logStockReturn', `${p.name} +1 (${p.qty})`, p.id); } }
      r.status='cancelled'; r.cancelledAt=now(); if((r.deposit||0)>0) r.depositRefunded=true;
      await idbPut('rentals',r);
      await logAct('logCancelRental', r.name+(r.customerName?' · '+r.customerName:'')+(how==='code'?(' · '+t('authorizedBy')):''));
      toast(t('rentalCancelled'),'ok'); viewRentals();
    });
  },true);
}
async function openExtendModal(r){
  if(!r) return;
  const p=r.productId? await idbGet('products',r.productId) : null;
  const perDay = (p && p.rentUnit==='day' && p.rentRate) ? p.rentRate : Math.round((r.price||0)/Math.max(1,r.days||1));
  modal(t('extendRental'),
   `<p style="font-weight:700;font-size:16px;margin-bottom:2px">${esc(r.name)}</p>
    <p class="subtle" style="margin-bottom:14px">${esc(r.customerName||'')} · ${esc(t('dueDate'))}: ${r.dueDate?fmtDate(Date.parse(r.dueDate)):'—'}</p>
    <div class="field"><label>${esc(t('extendBy'))} (${esc(t('days'))})</label><input id="ex_days" type="number" min="1" value="1"></div>
    <div class="field"><label>${esc(t('newDueDate'))}</label><input id="ex_newDue" type="date" readonly></div>
    <div class="field"><label>${esc(t('additionalCharge'))}</label><input id="ex_charge" type="number" min="0" step="0.01" value="${perDay}"></div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="ex_go">${esc(t('extendRental'))}</button>`);
  const daysI=document.getElementById('ex_days'), newDueI=document.getElementById('ex_newDue'), chargeI=document.getElementById('ex_charge');
  function sync(){ const d=Math.max(1,parseInt(daysI.value||1)); const base=r.dueDate?Date.parse(r.dueDate):Date.now(); const newDue=new Date(base+d*86400000); newDueI.value=newDue.toISOString().slice(0,10); chargeI.value=perDay*d; }
  daysI.oninput=sync; sync();
  document.getElementById('ex_go').onclick=async()=>{
    const d=Math.max(1,parseInt(daysI.value||1));

    closeModal(); toast(t('extended'),'ok'); viewRentals();
  };
}

async function oldestDebtDate(cid){
  const sales=(await idbAll('sales')).filter(s=>s.customerId===cid && !s.voided && (s.total-(s.paid||0))>0);
  const rentals=(await idbAll('rentals')).filter(r=>r.customerId===cid && r.status!=='cancelled' && ((r.price||0)+(r.lateFee||0)-(r.paid||0))>0);
  const dates=[...sales,...rentals].map(x=>x.createdAt).filter(Boolean);
  return dates.length? Math.min(...dates) : null;
}
function ageBadge(oldest){
  if(!oldest) return '';
  const days=Math.floor((Date.now()-oldest)/86400000);
  if(days>=60) return `<span class="badge red" style="margin-inline-start:6px">${days}${esc(t('daysShort'))}</span>`;
  if(days>=30) return `<span class="badge warnb" style="margin-inline-start:6px">${days}${esc(t('daysShort'))}</span>`;
  return `<span class="subtle" style="font-size:11px;margin-inline-start:6px">${days}${esc(t('daysShort'))}</span>`;
}
/* ============================================================
   CLIENTS / CUSTOMERS — profiles ranked by loyalty score
============================================================ */
/* One pass over sales + rentals → per-customer stats and a composite loyalty score.
   Score rewards spend (loyalty points), manual star rating, and repeat visits;
   it penalises repeat late payment and any current outstanding balance. */
async function allCustomerStats(){
  const [custs,sales,rentals]=await Promise.all([idbAll('customers'),idbAll('sales'),idbAll('rentals')]);
  const map={};
  custs.forEach(c=>{ map[c.id]={cust:c,spent:0,tx:0,balance:0,lateCount:0,last:c.createdAt||0}; });
  sales.forEach(s=>{ const m=map[s.customerId]; if(!m||s.voided) return;
    m.spent+=(s.paid||0); m.tx++; m.balance+=Math.max(0,(s.total||0)-(s.paid||0)); if(s.createdAt>m.last)m.last=s.createdAt; });
  rentals.forEach(r=>{ const m=map[r.customerId]; if(!m || r.status==='cancelled') return;
    m.spent+=(r.paid||0); m.tx++; m.balance+=Math.max(0,(r.price||0)+(r.lateFee||0)-(r.paid||0));
    if(r.lateFee>0)m.lateCount++; if(r.createdAt>m.last)m.last=r.createdAt; });
  return Object.values(map).map(m=>{
    m.points=Math.floor(m.spent/100); // matches customerPoints(): 1 pt / 100 DA
    m.rating=m.cust.rating||0;
    m.score=Math.max(0, Math.round(m.points + m.rating*25 + m.tx*10 - m.lateCount*20 - (m.balance>0?15:0)));
    return m;
  });
}

async function viewLedger(){
  const view=document.getElementById('view');
  const custs=await getCustomers();
  const rows=[];
  for(const c of custs){ const b=await customerBalance(c.id); if(b>0){ const oldest=await oldestDebtDate(c.id); rows.push({c,b,oldest}); } }
  rows.sort((a,b)=> (a.oldest||Infinity)-(b.oldest||Infinity)); // oldest debt first — who to chase
  view.innerHTML=pageHead(t('ledger'),t('customers'))+
    (rows.length? `<div class="tablewrap"><table><thead><tr>

async function openPaymentModal(cust){
  const bal=await customerBalance(cust.id);
  modal(t('addPayment'),
   `<p style="font-weight:700;font-size:16px">${esc(cust.name)}</p>
    <p class="subtle" style="margin-bottom:14px">${esc(t('balance'))}: <b>${money(bal)}</b></p>
    <div class="field"><label>${esc(t('payToward'))}</label><input id="pay_amt" type="number" min="0" step="0.01" value="${bal}" max="${bal}"></div>
    <div class="field"><label>${esc(t('paymentMethod'))}</label>
      <div class="seg" id="pay_method">
        <button type="button" data-m="cash" class="on">${esc(t('cash'))}</button>
        <button type="button" data-m="card">${esc(t('card'))}</button>
        <button type="button" data-m="mobile">${esc(t('mobile'))}</button>
      </div>
    </div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="pay_go">${esc(t('addPayment'))}</button>`);
  let method='cash';
  document.querySelectorAll('#pay_method button').forEach(b=>b.onclick=()=>{ method=b.dataset.m; document.querySelectorAll('#pay_method button').forEach(x=>x.classList.toggle('on',x===b)); });
  document.getElementById('pay_go').onclick=async()=>{
    const goBtn=document.getElementById('pay_go');
    if(goBtn.disabled) return; goBtn.disabled=true; // double-tap records two payments
    const amt=Math.min(bal,Math.max(0,Number(document.getElementById('pay_amt').value||0)));
    if(amt<=0){ toast(t('required'),'err'); goBtn.disabled=false; return; }
    // apply FIFO to sales then rentals balances
    let remain=amt;
    const sales=(await idbAll('sales')).filter(s=>s.customerId===cust.id && !s.voided && (s.total-(s.paid||0))>0).sort((a,b)=>a.createdAt-b.createdAt);
    for(const s of sales){ if(remain<=0)break; const d=Math.min(remain,s.total-(s.paid||0)); s.paid=(s.paid||0)+d; s.balance=s.total-s.paid; remain-=d; await idbPut('sales',s); }
    const rentals=(await idbAll('rentals')).filter(r=>r.customerId===cust.id && r.status!=='cancelled' && ((r.price+(r.lateFee||0))-(r.paid||0))>0).sort((a,b)=>a.createdAt-b.createdAt);
    for(const r of rentals){ if(remain<=0)break; const d=Math.min(remain,(r.price+(r.lateFee||0))-(r.paid||0)); r.paid=(r.paid||0)+d; remain-=d; await idbPut('rentals',r); }
    const pay={id:uid(),customerId:cust.id,refType:'repayment',amount:amt,method,createdAt:now(),userId:State.user.id};
    await idbPut('payments',pay);
    await logAct('logPayment', cust.name+' · '+money(amt));
    closeModal(); toast(t('paymentSaved'),'ok');
    const balAfter=await customerBalance(cust.id);
    offerReceipt(()=>buildRepaymentReceiptHtml(cust,amt,balAfter), t('repayment'));
    viewLedger();
  };
}

async function customerPoints(cid){
  const sales=(await idbAll('sales')).filter(s=>s.customerId===cid && !s.voided);
  const rentals=(await idbAll('rentals')).filter(r=>r.customerId===cid && r.status!=='cancelled');
  const spent=sales.reduce((a,s)=>a+(s.paid||0),0)+rentals.reduce((a,r)=>a+(r.paid||0),0);
  return Math.floor(spent/100); // 1 point per 100 DA paid
}

function rowSale(s){

      ${!s.refunded&&!s.voided?`<button class="btn ghost sm" data-refund="${s.id}" title="${esc(t('refundSale'))}" style="color:var(--danger)">${svg(IC.ret,'ic')}</button>`:''}

async function voidSale(sale){
  if(!sale) return;
  if(Date.now()-sale.createdAt>=3600000){ toast(t('voidExpired'),'err'); return; }
  const doVoid=async()=>{
    for(const it of (sale.items||[])){ const p=await idbGet('products',it.productId); if(p){ p.qty=(p.qty||0)+it.qty; await idbPut('products',p); await logAct('logStockVoid', `${p.name} +${it.qty} (${p.qty})`, p.id); } }
    const cashBack=sale.paid||0;
    sale.voided=true; sale.paid=0; sale.balance=0;
    await idbPut('sales',sale);
    if(cashBack>0) await idbPut('payments',{id:uid(),customerId:sale.customerId||null,refType:'void',amount:-cashBack,method:sale.method||'cash',createdAt:now(),userId:State.user.id});
    await logAct('logVoidSale', `${sale.customerName||t('walkIn')} · ${money(sale.total)}`);
    toast(t('voided'),'ok'); viewSales();
  };
  confirmDialog(t('voidConfirm'),()=>{ if(!isOwner()) requireAuth(doVoid); else doVoid(); },true);
}
async function openRefundModal(sale){
  modal(t('refundSale'),
   `<p style="font-weight:700;font-size:16px;margin-bottom:2px">${esc(sale.customerName||t('walkIn'))}</p>
    <p class="subtle" style="margin-bottom:14px">${esc(t('total'))}: <b>${money(sale.total)}</b> · ${esc(t('paid'))}: ${money(sale.paid)}</p>
    <div class="field"><label>${esc(t('refund'))} ${esc(t('amount'))}</label><input id="rf_amt" type="number" min="0" max="${sale.paid}" step="0.01" value="${sale.paid}"></div>
    <div class="field"><label class="check"><input type="checkbox" id="rf_restock" checked> ${esc(t('addStock'))} (${esc(t('reasonForAction'))}: ${esc(t('refundSale'))})</label></div>
    <div class="field"><label>${esc(t('reasonForAction'))} *</label><input id="rf_reason" type="text" placeholder="${esc(t('requireReason'))}"></div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="rf_go" style="background:var(--danger)">${esc(t('refundSale'))}</button>`);
  document.getElementById('rf_go').onclick=async()=>{
    const amt=Math.min(sale.paid,Math.max(0,Number(document.getElementById('rf_amt').value||0)));
    const reason=document.getElementById('rf_reason').value.trim();
    if(!reason){ toast(t('required'),'err'); return; }
    const restock=document.getElementById('rf_restock').checked;
    const finalize=async()=>{
      if(restock){ for(const it of (sale.items||[])){ const p=await idbGet('products',it.productId); if(p){ p.qty=(p.qty||0)+it.qty; await idbPut('products',p); await logAct('logStockRefund', `${p.name} +${it.qty} (${p.qty})`, p.id); } } }
      sale.refunded=true; sale.refundAmount=(sale.refundAmount||0)+amt; sale.refundReason=reason;
      sale.paid=Math.max(0,(sale.paid||0)-amt);
      sale.total=Math.max(0,(sale.total||0)-amt);
      sale.balance=Math.max(0,(sale.total||0)-sale.paid);
      await idbPut('sales',sale);
      if(amt>0) await idbPut('payments',{id:uid(),customerId:sale.customerId||null,refType:'refund',amount:-amt,method:sale.method||'cash',createdAt:now(),userId:State.user.id});
      await logAct('logRefundSale', `${sale.customerName||t('walkIn')} · ${money(amt)} · ${reason}`);
      closeModal(); toast(t('stockAdded'),'ok'); viewSales();
    };
    if(!isOwner()) requireAuth(finalize); else finalize();
  };
}
let repPeriod='month', repCustomFrom='', repCustomTo='', bestMode='volume';
async function viewReports(){
  const view=document.getElementById('view');
  if(!isOwner()){ view.innerHTML=pageHead(t('reports'))+emptyState(IC.chart,t('ownerOnly'),t('ownerOnlyMsg')); return; }
  const {from,to}=dateRangeFor(repPeriod,repCustomFrom,repCustomTo);
  const [sales,rentals,expenses,products]=await Promise.all([idbAll('sales'),idbAll('rentals'),idbAll('expenses'),idbAll('products')]);
  const S=sales.filter(s=>s.createdAt>=from && s.createdAt<=to && !s.voided), R=rentals.filter(r=>r.createdAt>=from && r.createdAt<=to && r.status!=='cancelled'), E=expenses.filter(x=>x.createdAt>=from && x.createdAt<=to && !x.isWithdrawal);
  const salesRev=S.reduce((a,s)=>a+(s.paid||0),0);
  const rentRev=R.reduce((a,r)=>a+(r.paid||0),0);
  // Deposits kept (damage/cleaning/late/lost) are income, recognised when the item is returned.
  const depKept=rentals.filter(r=>(r.depositKept||0)>0 && (r.returnedAt||r.createdAt)>=from && (r.returnedAt||r.createdAt)<=to).reduce((a,r)=>a+(r.depositKept||0),0);
  const revenue=salesRev+rentRev+depKept;
  const exp=E.reduce((a,x)=>a+(x.amount||0),0);
  // cost of goods sold (owner sees profit): sum cost of sold items in period
  let cogs=0;
  const prodMap={}; products.forEach(p=>prodMap[p.id]=p);
  // best-sellers aggregation
  const sellAgg={}; // productId -> {name,qty,revenue,profit}
  for(const s of S){ for(const it of (s.items||[])){
    const p=prodMap[it.productId];
    if(p&&p.costPrice) cogs+=p.costPrice*it.qty;
    const key=it.productId||it.name;
    if(!sellAgg[key]) sellAgg[key]={name:it.name,qty:0,revenue:0,profit:0};
    sellAgg[key].qty+=it.qty;
    sellAgg[key].revenue+=(it.price*it.qty);
    sellAgg[key].profit+=((it.price-(p?p.costPrice||0:0))*it.qty);
  }}
  const bestList=Object.values(sellAgg).sort((a,b)=> bestMode==='profit'? b.profit-a.profit : b.qty-a.qty).slice(0,8);
  const topItem=Object.values(sellAgg).sort((a,b)=>b.qty-a.qty)[0]||null;
  const custAgg={}; // customerId -> {name,count,total}
  for(const s of S){ if(!s.customerId) continue; const key=s.customerId; if(!custAgg[key]) custAgg[key]={name:s.customerName,count:0,total:0}; custAgg[key].count++; custAgg[key].total+=(s.paid||0); }
  for(const r of R){ if(!r.customerId) continue; const key=r.customerId; if(!custAgg[key]) custAgg[key]={name:r.customerName,count:0,total:0}; custAgg[key].count++; custAgg[key].total+=(r.paid||0); }
  const topCustomer=Object.values(custAgg).sort((a,b)=>b.count-a.count)[0]||null;
  // last-7-days trend (always last 7 calendar days regardless of selected period, for consistent chart context)
  const dayLabels=[], salesDaily=[], rentDaily=[], expDaily=[];

    rentDaily.push(rentals.filter(r=>r.createdAt>=dStart&&r.createdAt<dEnd).reduce((a,r)=>a+(r.paid||0),0));
    expDaily.push(expenses.filter(x=>x.createdAt>=dStart&&x.createdAt<dEnd).reduce((a,x)=>a+(x.amount||0),0));
  }
  const profit=revenue-exp-cogs;
  const owed=(await allCustomerStats()).reduce((a,m)=>a+m.balance,0);

  view.innerHTML=pageHead(t('reports'),'',
    `<div class="seg" id="repSeg">
       ${['today','week','month','all','custom'].map(p=>`<button data-p="${p}" class="${repPeriod===p?'on':''}">${esc(t(p))}</button>`).join('')}

       <div class="field"><label>${esc(t('from'))}</label><input type="date" id="repFrom" value="${esc(repCustomFrom)}"></div>
       <div class="field"><label>${esc(t('to'))}</label><input type="date" id="repTo" value="${esc(repCustomTo)}"></div>
     </div></div>` : '')+
   `<div class="cards" style="margin-bottom:22px">
     <div class="stat gold"><div class="corner">${svg(IC.money)}</div><div class="k">${esc(t('revenue'))}</div><div class="v mono">${money(revenue)}</div></div>
     <div class="stat"><div class="corner">${svg(IC.chart)}</div><div class="k">${esc(t('expenses'))}</div><div class="v mono">${money(exp)}</div></div>
     <div class="stat ${profit>=0?'':'danger'}"><div class="corner">${svg(IC.up)}</div><div class="k">${esc(t('profit'))}</div><div class="v mono">${money(profit)}</div></div>
     <div class="stat ${owed>0?'warn':''}"><div class="corner">${svg(IC.debt)}</div><div class="k">${esc(t('debtOutstanding'))}</div><div class="v mono">${money(owed)}</div></div>
   </div>
   <div class="cards" style="margin-bottom:22px">
     <div class="stat brand"><div class="corner">${svg(IC.users)}</div><div class="k">${esc(t('bestCustomer'))}</div>
       <div class="v" style="font-size:18px">${topCustomer?esc(topCustomer.name):'—'}</div>
       ${topCustomer?`<div class="sub">${topCustomer.count} ${esc(t('purchases'))} · ${money(topCustomer.total)}</div>`:''}
     </div>
     <div class="stat brand"><div class="corner">${svg(IC.box)}</div><div class="k">${esc(t('mostPopularItem'))}</div>
       <div class="v" style="font-size:18px">${topItem?esc(topItem.name):'—'}</div>
       ${topItem?`<div class="sub">${esc(t('soldTimes').replace('{n}',topItem.qty))}</div>`:''}
     </div>
   </div>
   <div class="grid" style="grid-template-columns:1fr 1fr;gap:18px" id="repGrid">
     <div class="card pad">
       <h3 style="margin-bottom:12px">${esc(t('breakdown'))}</h3>
       <table><tbody>
         <tr><td>${esc(t('salesRevenue'))}</td><td class="t-right mono">${money(salesRev)}</td></tr>
         <tr><td>${esc(t('rentalRevenue'))}</td><td class="t-right mono">${money(rentRev)}</td></tr>
         ${depKept>0?`<tr><td>${esc(t('depositsKept'))}</td><td class="t-right mono">${money(depKept)}</td></tr>`:''}
         <tr><td class="subtle">${esc(t('cost'))} (COGS)</td><td class="t-right mono subtle">− ${money(cogs)}</td></tr>
         <tr><td class="subtle">${esc(t('expenses'))}</td><td class="t-right mono subtle">− ${money(exp)}</td></tr>

       </tbody></table>
     </div>
     <div class="card pad">
       <div style="display:flex;align-items:center;margin-bottom:12px"><h3>${esc(t('expenses'))}</h3><button class="btn sm" id="addExp" style="margin-inline-start:auto">${svg(IC.plus,'ic')}${esc(t('addExpense'))}</button></div>
       <div id="expList"></div>

     <div class="card pad">
       <h3 style="margin-bottom:12px">${esc(t('revenue'))} · 7d</h3>
       ${barChartSvg(dayLabels,[
         {name:t('salesRevenue'),values:salesDaily,color:'var(--gold)'},

async function openCashDrawerModal(){
  const t0=startOf('today');
  const payments=(await idbAll('payments')).filter(p=>p.createdAt>=t0 && (p.method||'cash')==='cash');
  const expenses=(await idbAll('expenses')).filter(x=>x.createdAt>=t0);
  const cashIn=payments.reduce((a,p)=>a+(p.amount||0),0); // journal includes negatives for refunds/voids
  const cashOut=expenses.reduce((a,x)=>a+(x.amount||0),0);
  const expected=cashIn-cashOut;
  modal(t('cashCount'),
   `<p class="subtle" style="margin-bottom:14px">${esc(t('expectedCash'))}: <b class="mono">${money(expected)}</b></p>
    <div class="field"><label>${esc(t('actualCash'))}</label><input id="cd_actual" type="number" min="0" step="0.01" value="${expected}"></div>
    <p id="cd_diff" class="subtle" style="margin-top:8px"></p>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('close'))}</button>`);
  const inp=document.getElementById('cd_actual'), diff=document.getElementById('cd_diff');
  function sync(){ const actual=Number(inp.value||0); const d=actual-expected;
    diff.innerHTML = d===0? `<span class="badge green">${esc(t('difference'))}: 0</span>` : `<span class="badge ${d>0?'green':'red'}">${esc(t('difference'))}: ${d>0?'+':''}${money(d)}</span>`; }
  inp.oninput=sync; sync();
}
function drawExpenses(E){
  const el=document.getElementById('expList'); if(!el) return;
  E=E.sort((a,b)=>b.createdAt-a.createdAt).slice(0,12);
  el.innerHTML = E.length? `<table><tbody>${E.map(x=>`<tr>
     <td>${esc(x.label)}<div class="subtle" style="font-size:11px">${esc(x.categoryLabel||x.category||'')}${x.userName?' · '+esc(x.userName):''} · ${fmtDate(x.createdAt)}</div></td>
     <td class="t-right mono">${money(x.amount)}</td>
     <td class="t-right"><button class="btn ghost sm" data-delx="${x.id}" style="color:var(--danger)">${svg(IC.trash,'ic')}</button></td>
   </tr>`).join('')}</tbody></table>` : `<p class="subtle" style="padding:10px 0">${esc(t('noExpenses'))}</p>`;
  el.querySelectorAll('[data-delx]').forEach(b=>b.onclick=()=>guardDelete('expenses',b.dataset.delx,'logExpDel','',()=>viewReports()));
}
function openExpenseModal(onDone){
  const cats=['rent','electricity','water','cleaningSupplies','specificItem','other'];
  modal(t('addExpense'),
   `<div class="field"><label>${esc(t('category'))} *</label>
      <select id="e_cat">${cats.map(c=>`<option value="${c}">${esc(t(c))}</option>`).join('')}</select>
    </div>
    <div class="field" id="e_customBox"><label>${esc(t('expenseLabel'))} *</label><input id="e_label" type="text" placeholder="${esc(t('specifyItem'))}"></div>
    <div class="field"><label>${esc(t('amount'))} *</label><input id="e_amt" type="number" min="0" step="0.01"></div>
    <div class="field"><label>${esc(t('reasonForAction'))}</label><input id="e_note" type="text" placeholder="${esc(t('optional'))}"></div>`,
   `<button class="btn secondary" onclick="closeModal()">${esc(t('cancel'))}</button>
    <button class="btn" id="e_go">${esc(t('save'))}</button>`);
  const catSel=document.getElementById('e_cat'), labelBox=document.getElementById('e_customBox'), labelInp=document.getElementById('e_label');
  function syncLabelBox(){ const needsLabel = catSel.value==='specificItem'||catSel.value==='other'; labelBox.classList.toggle('hidden',!needsLabel); if(!needsLabel) labelInp.value=t(catSel.value); }
  catSel.onchange=syncLabelBox; syncLabelBox();
  document.getElementById('e_go').onclick=async()=>{
    const cat=catSel.value;
    const needsLabel = cat==='specificItem'||cat==='other';
    const label = needsLabel? labelInp.value.trim() : t(cat);
    const amt=Number(document.getElementById('e_amt').value||0);
    if((needsLabel&&!label)||amt<=0){ toast(t('required'),'err'); return; }
    const note=document.getElementById('e_note').value.trim();
    await idbPut('expenses',{id:uid(),label,category:cat,categoryLabel:t(cat),note,amount:amt,createdAt:now(),userId:State.user.id,userName:State.user.name});
    await logAct('logExpAdd', label+' · '+money(amt)+' · '+State.user.name);
    closeModal(); toast(t('expenseSaved'),'ok');
    onDone? onDone() : (State.route==='reports' && viewReports());
  };
}
